        <div style="text-align:right;margin-top:8px;font-size:9px;color:#475569">${isLast?"TAP TO FIGHT ⚔️":"TAP TO CONTINUE ▶"}</div>

  }
  window.nextCutsceneLine=()=>{lineIdx++;renderLine()};
  renderLine();
}

function launchBossRush(){
  closeModal();
  bossRushStage=0;
  inBossRush=true;
  inArenaMode=false;arenaStreak=0;
  G.player.hp=G.player.maxHP;
  G.player.ce=G.player.maxCE;
  nextBossRushStage();
}

function nextBossRushStage(){
  if(bossRushStage>=BOSS_RUSH_BOSSES.length){
    // Victory — cleared all 8 bosses!
    if(!G.stats.bossRushClears)G.stats.bossRushClears=0;
    G.stats.bossRushClears++;
    G.gold+=2000;G.player.xp+=500;levelUp();
    if(!G.unlockedTitles.includes("Gauntlet Champion"))G.unlockedTitles.push("Gauntlet Champion");
    inBossRush=false;bossRushStage=0;
    saveGame();

    const ov=document.getElementById("overlays");
    ov.innerHTML=`<div class="modal-bg"><div class="modal" style="border-color:#fbbf2444;max-width:340px;text-align:center">
      <div style="font-size:64px;margin-bottom:8px">🏆</div>
      <h3 style="color:#fbbf24;margin-bottom:8px">BOSS RUSH COMPLETE!</h3>
      <p style="font-size:12px;color:#22c55e;font-weight:700;margin-bottom:4px">All 8 bosses defeated!</p>
      <div style="font-size:11px;color:#94a3b8;line-height:1.8;margin:8px 0">
        💰 +2000 gold<br>
        ⭐ +500 XP<br>
        🏅 Title: Gauntlet Champion<br>
        ★ Total clears: ${G.stats.bossRushClears}
      </div>
      <button class="btn" style="background:#fbbf24;color:#000;font-size:13px" onclick="closeModal();showScreen('hub')">Return to Hub</button>
    </div></div>`;
    return;
  }

  // Recovery between stages (not first stage)
  if(bossRushStage>0){
    const hpRegen=Math.floor(G.player.maxHP*0.2);
    const ceRegen=Math.floor(G.player.maxCE*0.25);
    G.player.hp=Math.min(G.player.maxHP,G.player.hp+hpRegen);
    G.player.ce=Math.min(G.player.maxCE,G.player.ce+ceRegen);
  }

  const stage=BOSS_RUSH_BOSSES[bossRushStage];
  const e=getEnemyForGrade(stage.grade);
  // Boss Rush enemies are 20% stronger
  e.hp=Math.floor(e.hp*1.2);e.maxHP=e.hp;
  e.atk=Math.floor(e.atk*1.2);e.def=Math.floor(e.def*1.2);

  G.currentLocation=bossRushStage;
  G.enemy=e;G.battleLog=[];G.battleResult=null;G.battleTurn="player";G.atkBuff=1;
  G.battleTurnCount=0;G.enemyDomainUsed=false;G.bindingVow=null;G.awakened=false;G.dailyMod=null;

  addBattleLog(`🎪 BOSS RUSH — Stage ${bossRushStage+1}/8`,"crit");
  addBattleLog(`📍 ${stage.locName}: ${stage.intro}`,"alert");
  addBattleLog(`A ${e.name} ${e.icon} (Grade ${e.grade<=-2?"Supreme":e.grade<=-1?"Special":e.grade}) appears!${e.domain?" ⚠️ Can expand Domain!":""}`,"alert");
  if(bossRushStage>0)addBattleLog(`💚 Recovery: +${Math.floor(G.player.maxHP*0.2)} HP, +${Math.floor(G.player.maxCE*0.25)} CE`,"heal");
  showScreen("battle");
}

    const hasBasketEquipped=G.equipment.accessory==="Hollow Wicker Basket";
    const hasBasketInv=(G.inventory["Hollow Wicker Basket"]||0)>0;
    const hasSimple=hasSimpleTech||hasBasketEquipped||hasBasketInv;
    const simpleReduction=hasSimpleTech?0.7:hasBasketEquipped?0.6:0.5;
    const simpleLabel=hasSimpleTech?"Simple Domain":hasBasketEquipped?"Hollow Wicker Basket (Equipped)":"Hollow Wicker Basket (Item)";

    // Prison Realm check
    const hasPrisonEquipped=G.equipment.accessory==="Prison Realm";
    const hasPrisonInv=(G.inventory["Prison Realm"]||0)>0;
    const hasPrison=hasPrisonEquipped||hasPrisonInv;

    ov.innerHTML=`<div class="edc-overlay" style="background:${dbg}ee">
      <div class="dom-pulse" style="background:radial-gradient(circle,${dc}10,transparent 50%)"></div>
      <div style="font-size:40px;margin-bottom:8px;filter:drop-shadow(0 0 20px ${dc})">${e.icon}</div>
      <div style="font-size:11px;color:#ef4444;letter-spacing:4px;text-transform:uppercase;font-family:'Russo One',sans-serif;margin-bottom:4px">DOMAIN EXPANDED</div>
      <div style="font-size:28px;font-weight:900;color:${dc};font-family:'Noto Sans JP',serif;text-shadow:0 0 30px ${dc};letter-spacing:4px;margin-bottom:2px">${d.name}</div>
      <div style="font-size:14px;color:#fff;font-family:'Russo One',sans-serif;margin-bottom:4px">${d.sub}</div>
      <div style="font-size:10px;color:#f87171;margin-bottom:16px;text-align:center;max-width:300px">Sure-hit attack incoming. How do you respond?</div>
      <div class="edc-choices">
        ${hasDomain?`<button class="edc-choice" ${canDomain?"":"disabled"} style="border-color:${canDomain?pc:"#333"};background:${canDomain?pc+"33":"#111"};color:${canDomain?pc:"#555"}" onclick="resolveDomainChallenge('domain')">🌀 Counter: ${hasDomain}<div class="sub">${canDomain?`CE: ${TECHNIQUES[hasDomain].ceCost} — Clash domains! Stronger domain wins.`:"Not enough CE"}</div></button>`:""}
        ${hasSimple?`<button class="edc-choice" style="border-color:#6366f1;background:#6366f122;color:#a5b4fc" onclick="resolveDomainChallenge('simple')">🛡️ ${simpleLabel}<div class="sub">Nullifies sure-hit. Take reduced damage (${Math.floor((1-simpleReduction)*100)}%).</div></button>`:`<button class="edc-choice" disabled style="border-color:#333;background:#111;color:#555">🛡️ Simple Domain / Wicker Basket<div class="sub">You don't have this ability or item.</div></button>`}
        ${hasPrison?`<button class="edc-choice" style="border-color:#eab308;background:#eab30822;color:#fbbf24" onclick="resolveDomainChallenge('prison')">📦 Prison Realm<div class="sub">Seals the domain completely! Stuns enemy + backlash damage.</div></button>`:`<button class="edc-choice" disabled style="border-color:#333;background:#111;color:#555">📦 Prison Realm<div class="sub">You don't have a Prison Realm.</div></button>`}
        <button class="edc-choice" style="border-color:#ef444444;background:#ef444415;color:#f87171" onclick="resolveDomainChallenge('endure')">💀 Endure It<div class="sub">Take the full guaranteed hit. High damage but you survive... maybe.</div></button>

  },2200);
}

function resolveDomainChallenge(response){
  const ov=document.getElementById("overlays");ov.innerHTML="";
  const e=G.enemy,d=e.domain,dp=d.power||3;

  if(response==="domain"){
    const pDom=G.player.techniques.find(t=>TECHNIQUES[t]&&TECHNIQUES[t].type==="domain");
    if(pDom&&G.player.ce>=TECHNIQUES[pDom].ceCost){
      G.player.ce-=TECHNIQUES[pDom].ceCost;
      const pp=TECHNIQUES[pDom].power||3.5;
      G.stats.domainUses++;
      if(pp>=dp){
        const dmg=Math.floor(G.player.atk*pp*.8);G.enemy.hp=Math.max(0,G.enemy.hp-dmg);
        G.stats.domainCounters++;
        addBattleLog(`🌀 Your domain overpowers! ${pDom} deals ${dmg} damage!`,"crit");
        if(G.enemy.hp<=0){handleVictory();return}
      }else{
        const dmg=Math.floor(e.atk*(dp-pp)*1.5);G.player.hp=Math.max(0,G.player.hp-dmg);
        addBattleLog(`🌀 Domains clash! Enemy stronger — ${dmg} reduced damage!`,"enemy");
      }
    }else{
      const dmg=Math.floor(e.atk*dp);G.player.hp=Math.max(0,G.player.hp-dmg);
      addBattleLog(`Not enough CE! Take ${dmg} guaranteed damage!`,"alert");
    }
  }else if(response==="simple"){
    // Simple Domain or Hollow Wicker Basket — nullifies sure-hit, reduced damage
    const hasSimpleTech=G.player.techniques.some(t=>t==="Simple Domain"||t==="Don't Move");
    const hasBasketEquipped=G.equipment.accessory==="Hollow Wicker Basket";
    const hasBasketInv=(G.inventory["Hollow Wicker Basket"]||0)>0;
    let reduction=0.5,label="Hollow Wicker Basket";
    if(hasSimpleTech){reduction=0.7;label="Simple Domain"}
    else if(hasBasketEquipped){reduction=0.6;label="Hollow Wicker Basket"}
    else if(hasBasketInv){
      reduction=0.5;label="Hollow Wicker Basket";
      // Consume from inventory if not equipped
      G.inventory["Hollow Wicker Basket"]--;
      if(G.inventory["Hollow Wicker Basket"]<=0)delete G.inventory["Hollow Wicker Basket"];
    }
    const dmg=Math.floor(e.atk*dp*(1-reduction));
    G.player.hp=Math.max(0,G.player.hp-dmg);
    G.stats.domainCounters=(G.stats.domainCounters||0)+1;
    addBattleLog(`🛡️ ${label} blocks the sure-hit! ${dmg} reduced damage.`,"buff");
  }else if(response==="prison"){
    // Prison Realm — seals domain completely, stuns enemy, backlash damage
    const hasPrisonEquipped=G.equipment.accessory==="Prison Realm";
    if(!hasPrisonEquipped){
      // Consume from inventory
      G.inventory["Prison Realm"]=(G.inventory["Prison Realm"]||0)-1;
      if(G.inventory["Prison Realm"]<=0)delete G.inventory["Prison Realm"];
    }
    const dmg=Math.floor(e.atk*1.5);
    G.enemy.hp=Math.max(0,G.enemy.hp-dmg);
    G.stats.domainCounters=(G.stats.domainCounters||0)+1;
    addBattleLog(`📦 PRISON REALM activates! ${e.name}'s domain is sealed!`,"crit");
    addBattleLog(`Domain backlash deals ${dmg} to ${e.name}!`,"attack");
    if(G.enemy.hp<=0){handleVictory();return}
    // Free turn — enemy is stunned
    G.player.ce=Math.min(G.player.maxCE,G.player.ce+Math.floor(5+Math.random()*5));
    G.battleTurn="player";renderBattle();return;
  }else{
    const dmg=Math.floor(e.atk*dp);G.player.hp=Math.max(0,G.player.hp-dmg);
    addBattleLog(`💀 You endure! ${dmg} guaranteed damage!`,"enemy");
  }

  G.player.ce=Math.min(G.player.maxCE,G.player.ce+Math.floor(5+Math.random()*5));
  if(G.player.hp<=0){G.battleResult="defeat";addBattleLog("You have been exorcised...","alert")}
  else G.battleTurn="player";
  renderBattle();
}

function useHubItem(n){
  const it=ITEMS[n];if(!it||it.type!=="consumable"||!G.inventory[n])return;
  G.inventory[n]--;if(G.inventory[n]<=0)delete G.inventory[n];
  if(it.effect.hp)G.player.hp=Math.min(G.player.maxHP,G.player.hp+it.effect.hp);
  if(it.effect.ce)G.player.ce=Math.min(G.player.maxCE,G.player.ce+it.effect.ce);
  saveGame();
}

function equipItem(n){
  const it=ITEMS[n];if(!it||it.type!=="equipment")return;
  if(G.equipment[it.slot]){G.inventory[G.equipment[it.slot]]=(G.inventory[G.equipment[it.slot]]||0)+1}
  G.equipment[it.slot]=n;G.inventory[n]--;if(G.inventory[n]<=0)delete G.inventory[n];saveGame();
}
function unequipItem(slot){
  if(!G.equipment[slot])return;
  G.inventory[G.equipment[slot]]=(G.inventory[G.equipment[slot]]||0)+1;
  G.equipment[slot]=null;saveGame();
}

function craftItem(name){
  const r=CRAFTING_RECIPES.find(x=>x.name===name);if(!r)return;
  if(!Object.entries(r.ingredients).every(([m,q])=>(G.inventory[m]||0)>=q))return;
  Object.entries(r.ingredients).forEach(([m,q])=>{G.inventory[m]-=q;if(G.inventory[m]<=0)delete G.inventory[m]});
  G.inventory[r.name]=(G.inventory[r.name]||0)+1;
  if(!ITEMS[r.name])ITEMS[r.name]={type:"consumable",desc:r.desc,effect:r.effect,cost:0};
  G.stats.crafts++;saveGame();
}

async function searchPlayers(query){
  let results=[];
  try{
    const keys=await DB.list("player:",true);
    for(const k of keys.slice(0,100)){
      try{
        const raw=await DB.get(k,true);
        if(raw){const p=JSON.parse(raw);
          if(!query||p.name.toLowerCase().includes(query.toLowerCase()))results.push(p);
        }
      }catch(e){}
    }
  }catch(e){}
  return results.filter(p=>p.name!==pvpArenaName).sort((a,b)=>(b.level||0)-(a.level||0));
}

function generateBot(playerLevel){
  const keys=Object.keys(CHARACTERS);
  const classKey=keys[Math.floor(Math.random()*keys.length)];
  const c=CHARACTERS[classKey];
  const lvOffset=Math.floor(Math.random()*5)-2;
  const lv=Math.max(1,Math.min(playerLevel+lvOffset,25));
  const name=BOT_FIRST[Math.floor(Math.random()*BOT_FIRST.length)]+" "+BOT_LAST[Math.floor(Math.random()*BOT_LAST.length)];
  const streak=Math.floor(Math.random()*Math.min(lv*3,30));
  return{
    player:{classKey,name:c.name,level:lv,
      hp:c.baseHP+(lv-1)*12,maxHP:c.baseHP+(lv-1)*12,
      atk:c.baseATK+(lv-1)*3,def:c.baseDEF+(lv-1)*2,
      ce:c.baseCE+(lv-1)*8,maxCE:c.baseCE+(lv-1)*8,
      techniques:c.techniques,icon:c.icon,color:c.color},
    equipment:{weapon:null,accessory:null},
    isBot:true,arenaName:name,streak,
    equippedTitle:lv>=15?"Special Grade Sorcerer":lv>=10?"Grade 1 Sorcerer":lv>=7?"Grade 2 Sorcerer":"Grade 4 Sorcerer"
  };
}

function generateChampion(playerLevel){
  // Pick a random champion, scale to near player level
  const champ=ARENA_CHAMPIONS[Math.floor(Math.random()*ARENA_CHAMPIONS.length)];
  const c=CHARACTERS[champ.classKey];
  const lv=Math.max(champ.level,Math.min(playerLevel+2,25));
  return{
    player:{classKey:champ.classKey,name:c.name,level:lv,
      hp:c.baseHP+(lv-1)*12,maxHP:c.baseHP+(lv-1)*12,
      atk:c.baseATK+(lv-1)*3+5,def:c.baseDEF+(lv-1)*2+3,
      ce:c.baseCE+(lv-1)*8,maxCE:c.baseCE+(lv-1)*8,
      techniques:c.techniques,icon:c.icon,color:c.color},
    equipment:{weapon:null,accessory:null},
    isBot:true,isChampion:true,arenaName:champ.arenaName,streak:champ.streak,quote:champ.quote,
    equippedTitle:champ.title
  };
}

async function findMatch(){
  const rd=document.getElementById("pvpResults");
  rd.innerHTML=`<div style="text-align:center;padding:20px">
    <div style="font-size:24px;animation:pulse 1s infinite">🔍</div>
    <div style="color:#64748b;font-size:11px;margin-top:8px;letter-spacing:2px">${serverOnline?"Searching all players...":"Searching local rivals..."}</div>
  </div>`;

  let opponents=[];

  // 1. Try server matchmaking first (real multiplayer)
  if(serverOnline){
    const serverOps=await findServerOpponents();
    serverOps.forEach(op=>{if(opponents.length<3)opponents.push(op)});
  }

  // 2. Add local friend code rivals
  if(G.friendRivals&&G.friendRivals.length>0&&opponents.length<3){
    const shuffledFriends=[...G.friendRivals].sort(()=>Math.random()-.5);
    shuffledFriends.slice(0,3-opponents.length).forEach(fr=>{
      if(opponents.length<3){const build=getFriendBuild(fr);if(build)opponents.push(build)}
    });
  }

  // 3. Add a champion + bots to fill remaining slots
  if(opponents.length<3){opponents.push(generateChampion(G.player.level))}
  while(opponents.length<3){opponents.push(generateBot(G.player.level))}

  // Render opponent cards
  let h="";
  opponents.forEach((op,i)=>{
    const opc=CHARACTERS[op.player.classKey];
    const color=opc?.color||"#e2e8f0";
    const lvDiff=op.player.level-G.player.level;
    const diffLabel=lvDiff===0?"Same Level":lvDiff>0?`+${lvDiff} Lvs`:`${lvDiff} Lvs`;
    const diffColor=Math.abs(lvDiff)<=1?"#22c55e":Math.abs(lvDiff)<=3?"#eab308":"#ef4444";
    const titleData=op.equippedTitle&&TITLES[op.equippedTitle]?TITLES[op.equippedTitle]:null;
    const displayName=op.arenaName||op.player.name;
    const streak=op.streak||op.arenaStreak||0;
    const isChamp=op.isChampion;

    h+=`<div class="pvp-opp" style="border-color:${isChamp?color+"44":color+"22"};animation:fadeIn ${.2+i*.1}s ease;${isChamp?`background:linear-gradient(135deg,${color}08,#0a0a0f);box-shadow:0 0 15px ${color}11`:""}">
      <div style="display:flex;align-items:center;gap:10px;flex:1">
        <div style="position:relative">
          <span style="font-size:28px;filter:drop-shadow(0 0 6px ${color}44)">${op.player.icon}</span>
          ${isChamp?`<div style="position:absolute;top:-4px;right:-8px;font-size:6px;padding:1px 4px;background:#fbbf2422;color:#fbbf24;border:1px solid #fbbf2444;border-radius:3px;font-weight:700">👑</div>`
          :op.isFriend?`<div style="position:absolute;top:-4px;right:-8px;font-size:6px;padding:1px 4px;background:#22c55e22;color:#22c55e;border:1px solid #22c55e44;border-radius:3px;font-weight:700">👥 FRIEND</div>`
          :op.isBot?`<div style="position:absolute;top:-4px;right:-8px;font-size:6px;padding:1px 4px;background:#f9731622;color:#f97316;border:1px solid #f9731644;border-radius:3px;font-weight:700">NPC</div>`
          :`<div style="position:absolute;top:-4px;right:-8px;font-size:6px;padding:1px 4px;background:#22c55e22;color:#22c55e;border:1px solid #22c55e44;border-radius:3px;font-weight:700">REAL</div>`}
        </div>
        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:center;gap:6px">
            <div style="font-size:12px;font-weight:700;color:${color};font-family:'Russo One',sans-serif">${displayName}</div>
            ${streak>0?`<div style="font-size:9px;color:#fbbf24;font-weight:700">🔥${streak}</div>`:""}
          </div>
          <div style="font-size:9px;color:#64748b">${op.player.name} • Lv.${op.player.level} • ATK:${op.player.atk}
            <span style="color:${diffColor};font-weight:700;margin-left:4px">${diffLabel}</span>
          </div>
          ${titleData?`<div style="font-size:7px;color:${titleData.color};margin-top:1px">${titleData.icon} ${op.equippedTitle}</div>`:""}
          ${op.quote?`<div style="font-size:7px;color:#475569;font-style:italic;margin-top:2px">"${op.quote}"</div>`:""}
        </div>
      </div>
      <button style="padding:10px 18px;font-size:11px;font-weight:700;background:linear-gradient(135deg,${isChamp?"#fbbf24":"#ef4444"},${isChamp?"#d97706":"#dc2626"});color:${isChamp?"#000":"#fff"};border:none;border-radius:8px;cursor:pointer;font-family:'Russo One',sans-serif;letter-spacing:1px;box-shadow:0 0 12px ${isChamp?"#fbbf2433":"#ef444433"};transition:all .2s" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'" onclick='startPvPBattle(${JSON.stringify(op).replace(/'/g,"&#39;")})'>FIGHT</button>
    </div>`;
  });

  rd.innerHTML=h;
}

function startPvPBattle(build,streakContinue){
  const op=build.player;const eb=build.equipment||{weapon:null,accessory:null};
  let bATK=0,bDEF=0;
  [eb.weapon,eb.accessory].forEach(n=>{if(n&&ITEMS[n]?.type==="equipment"){bATK+=(ITEMS[n].bonusATK||0);bDEF+=(ITEMS[n].bonusDEF||0)}});
  G.currentLocation=0;
  inArenaMode=true;
  if(!streakContinue)arenaStreak=0;

  // Scale stats by arena streak — each round enemies get tougher
  const streakScale=1+arenaStreak*0.08;

  // Find the character's domain technique if they have one
  const techs=op.techniques||[];
  let enemyDomain=null;
  techs.forEach(t=>{const tc=TECHNIQUES[t];if(tc&&tc.type==="domain"&&tc.domainName){enemyDomain={name:tc.domainName,sub:tc.domainSub,color:tc.domainColor||"#ef4444",bg:tc.domainBg||"#0d0d0d",power:tc.power||3.5}}});

  const pvpEnemy={name:`${op.name}${build.isBot?" (Rival)":" (PvP)"}`,hp:Math.floor(op.maxHP*streakScale),maxHP:Math.floor(op.maxHP*streakScale),atk:Math.floor((op.atk+bATK)*streakScale),def:Math.floor((op.def+bDEF)*streakScale),ce:op.maxCE,
    grade:-1,xp:Math.floor(op.level*30*(1+arenaStreak*0.15)),icon:op.icon,drops:["Domain Fragment","Cursed Relic"],
    techniques:techs,domain:enemyDomain,isPvp:true,classKey:op.classKey};
  G.enemy=pvpEnemy;G.battleLog=[];G.battleResult=null;G.battleTurn="player";G.atkBuff=1;
  G.battleTurnCount=0;G.enemyDomainUsed=false;G.bindingVow=null;G.awakened=false;G.dailyMod=null;

  const opArenaName=build.arenaName||op.name;
  const opStreak=build.streak||build.arenaStreak||0;
  if(arenaStreak>0)addBattleLog(`🔥 Your Arena Streak: ${arenaStreak} — Enemies +${Math.floor(arenaStreak*8)}% stronger!`,"alert");
  addBattleLog(`⚔️ ${pvpArenaName||G.player.name} vs ${opArenaName}${opStreak>0?" 🔥"+opStreak:""}!`,"alert");
  if(build.isChampion)addBattleLog(`👑 ARENA CHAMPION! ${opArenaName} — ${build.quote||""}`,"crit");
  if(build.isBot){
    addBattleLog(`${build.isChampion?"⚠️ Champion":"🤖 Rival"} uses ${CHARACTERS[op.classKey]?.name||"Unknown"}'s techniques.`,"info");
    if(enemyDomain)addBattleLog(`⚠️ Can expand Domain: ${enemyDomain.sub}!`,"alert");
  }
  showScreen("battle");
}

function nextArenaFight(){
  // Small recovery between rounds — not a full heal
  const hpRegen=Math.floor(G.player.maxHP*0.2);
  const ceRegen=Math.floor(G.player.maxCE*0.25);
  G.player.hp=Math.min(G.player.maxHP,G.player.hp+hpRegen);
  G.player.ce=Math.min(G.player.maxCE,G.player.ce+ceRegen);
  arenaStreak++;

  // Generate a new bot scaled to player level + streak
  const bot=generateBot(G.player.level+Math.floor(arenaStreak/2));
  startPvPBattle(bot,true);
}

let transferStatus=null;
function openTransfer(){
  transferStatus=null;
  renderTransfer();

function getSaveBlob(){
  if(!G.player)return null;
  const d={p:G.player,g:G.gold,i:G.inventory,e:G.equipment,q:G.questLog,k:G.totalKills,
    s:G.stats,n:G.encounterCount,t:G.equippedTitle,u:G.unlockedTitles,v:7};
  try{return btoa(unescape(encodeURIComponent(JSON.stringify(d))))}catch(e){return null}
}

function loadSaveBlob(blob){
  try{
    const json=decodeURIComponent(escape(atob(blob.trim())));
    const d=JSON.parse(json);
    if(!d.p||!d.p.classKey)return{ok:false,msg:"Invalid save data."};
    G.player=d.p;G.gold=d.g||50;G.inventory=d.i||{"Healing Charm":3,"CE Pill":2};
    G.equipment=d.e||{weapon:null,accessory:null};G.totalKills=d.k||0;
    G.stats=d.s||{totalGold:0,crits:0,crafts:0,domainCounters:0,domainUses:0,shibuyaWins:0,cullingWins:0,sukuna20:0,vowUses:0,locationsVisited:[],bestArenaStreak:0,totalArenaWins:0};
    G.encounterCount=d.n||0;G.equippedTitle=d.t||"Grade 4 Sorcerer";
    G.unlockedTitles=d.u||["Grade 4 Sorcerer"];
    G.questLog=d.q||DEFAULT_QUESTS.map(q=>({...q}));
    saveGame();
    return{ok:true,msg:`Loaded! ${d.p.name} Lv.${d.p.level}`};
  }catch(e){return{ok:false,msg:"Could not read save data. Check you copied the full text."}}
}

function renderTransfer(){
  const ov=document.getElementById("overlays");
  const blob=getSaveBlob();
  let h=`<div class="modal-bg" onclick="closeModal()"><div class="modal" onclick="event.stopPropagation()" style="border-color:#6366f144">

    <p style="font-size:10px;color:#64748b;margin-bottom:12px;line-height:1.4">Move your save between Claude ↔ Chrome or any device. Copy the save text, paste it on the other side.</p>`;

  if(transferStatus){
    const sc=transferStatus.ok?"#22c55e":"#ef4444";
    h+=`<div class="status-msg" style="background:${sc}15;border-color:${sc}33;color:${sc}">${transferStatus.ok?"✅":"❌"} ${transferStatus.msg}</div>`;
  }

  // Export — copy save blob
  h+=`<div class="transfer-section">
    <div class="ts-title" style="color:#22c55e">⬆ Export Save</div>
    <div class="ts-desc">Tap Copy to get your save data. Paste it on the other device.</div>
    ${blob?`<textarea id="exportBlob" readonly style="width:100%;height:60px;padding:8px;font-size:9px;font-family:monospace;background:#0a0a0f;color:#22c55e;border:1px solid #22c55e33;border-radius:6px;resize:none;word-break:break-all">${blob}</textarea>
    <button class="btn" style="margin-top:6px;padding:8px 0;font-size:12px;background:#22c55e;color:#000;letter-spacing:1px" onclick="copyExport()">📋 COPY SAVE</button>`
    :`<div style="padding:12px;text-align:center;color:#475569;font-size:11px">No save to export — start a game first.</div>`}
  </div>`;

  // Import — paste save blob
  h+=`<div class="transfer-section">
    <div class="ts-title" style="color:#6366f1">⬇ Import Save</div>
    <div class="ts-desc">Paste the save data from your other device.</div>
    <textarea id="importBlob" placeholder="Paste save data here..." style="width:100%;height:60px;padding:8px;font-size:9px;font-family:monospace;background:#0a0a0f;color:#e2e8f0;border:1px solid #334155;border-radius:6px;resize:none;word-break:break-all"></textarea>
    <button class="btn" style="margin-top:6px;padding:8px 0;font-size:12px;background:#6366f1;color:#fff;letter-spacing:1px" onclick="pasteImport()">📥 LOAD SAVE</button>
  </div>`;

  h+=`<button class="modal-close" onclick="closeModal()">Close</button></div></div>`;
  ov.innerHTML=h;
}

function copyExport(){
  const el=document.getElementById("exportBlob");
  if(!el)return;
  try{
    if(navigator.clipboard&&navigator.clipboard.writeText){
      navigator.clipboard.writeText(el.value).then(()=>{
        transferStatus={ok:true,msg:"Copied! Paste this on your other device."};renderTransfer();
      }).catch(()=>{fallbackCopy(el)});
    }else{fallbackCopy(el)}
  }catch(e){fallbackCopy(el)}
}

function fallbackCopy(el){
  el.select();el.setSelectionRange(0,99999);
  try{document.execCommand("copy");transferStatus={ok:true,msg:"Copied! Paste this on your other device."}}
  catch(e){transferStatus={ok:true,msg:"Select all the text above and copy it manually."}}
  renderTransfer();
}

function pasteImport(){
  const el=document.getElementById("importBlob");
  if(!el||!el.value.trim()){transferStatus={ok:false,msg:"Paste your save data first."};renderTransfer();return}
  const result=loadSaveBlob(el.value);
  transferStatus=result;
  if(result.ok){setTimeout(()=>{closeModal();showScreen("hub")},1000)}
  renderTransfer();
}

// ═══════════════════════════════════════════════════════════════
// LOADING SCREEN
// ═══════════════════════════════════════════════════════════════

function runLoadingScreen(callback){
  try{
    const fill=document.getElementById("ldFill");
    const text=document.getElementById("ldText");
    const particles=document.getElementById("ldParticles");

    if(!fill||!text||!particles){
      try{document.getElementById("loadScreen").style.display="none"}catch(e){}
      Promise.resolve().then(callback).catch(e=>console.error(e));
      return;
    }

    let ph="";
    for(let i=0;i<20;i++){
      const x=Math.random()*100,delay=Math.random()*4,dur=3+Math.random()*3,size=1+Math.random()*2;
      ph+=`<div class="ld-p" style="left:${x}%;width:${size}px;height:${size}px;animation-delay:${delay}s;animation-duration:${dur}s;box-shadow:0 0 ${size*2}px #6366f166"></div>`;
    }
    particles.innerHTML=ph;

    const msgs=["Channeling cursed energy...","Forging binding vow...","Scanning for spirits...","Expanding domain barrier...","Loading combat records...","Attuning inner eye...","Preparing techniques...","Ready."];
    let progress=0,msgIdx=0;

    const interval=setInterval(()=>{
      try{
        progress+=Math.random()*15+5;
        if(progress>100)progress=100;
        fill.style.width=progress+"%";
        const newIdx=Math.min(Math.floor(progress/13),msgs.length-1);
        if(newIdx!==msgIdx){msgIdx=newIdx;text.style.opacity=0;setTimeout(()=>{try{text.textContent=msgs[msgIdx];text.style.opacity=1}catch(e){}},150)}
        if(progress>=100){
          clearInterval(interval);
          setTimeout(()=>{
            try{document.getElementById("loadScreen").classList.add("done")}catch(e){}
            setTimeout(()=>{Promise.resolve().then(callback).catch(e=>{console.error(e);showScreen("title")})},800);
          },400);
        }
      }catch(e){clearInterval(interval);Promise.resolve().then(callback).catch(e2=>console.error(e2))}
    },200);

    // Safety timeout
    setTimeout(()=>{
      if(progress<100){
        try{clearInterval(interval)}catch(e){}
        try{document.getElementById("loadScreen").classList.add("done")}catch(e){}
        setTimeout(()=>{Promise.resolve().then(callback).catch(e=>{console.error(e);showScreen("title")})},500);
      }
    },6000);
  }catch(e){
    console.error("Loading screen crash:",e);
    try{document.getElementById("loadScreen").style.display="none"}catch(e2){}
    Promise.resolve().then(callback).catch(e2=>console.error(e2));
  }
}

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════

(async function init(){
  console.log("[CursedLineage] Starting...");
  try{
    const hasCloudStorage=!!(window.storage&&typeof window.storage.get==='function');
    let hasLS=false;try{localStorage.setItem("_t","1");localStorage.removeItem("_t");hasLS=true}catch(e){}
    console.log("[CursedLineage] Storage: cloud="+hasCloudStorage+", localStorage="+hasLS);
  }catch(e){}

  const doInit=async()=>{
    try{
      const found=await loadGame();
      console.log("[CursedLineage] Save found:",found);
      await checkServer();
      if(found){checkTitleUnlocks();showScreen("hub");if(serverOnline&&pvpArenaName)syncToServer()}
      else showScreen("title");
    }catch(e){
      console.error("[CursedLineage] Init error:",e);
      showScreen("title");
    }
  };

  // Try loading screen, but if it fails for ANY reason, skip straight to game
  try{
    runLoadingScreen(doInit);
  }catch(e){
    console.error("[CursedLineage] Loading screen error:",e);
    try{document.getElementById("loadScreen").style.display="none"}catch(e2){}
    doInit();
  }
})();
</script>
