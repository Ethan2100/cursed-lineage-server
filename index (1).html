<meta name="twitter:card" content="summary_large_image">

<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect fill='%230a0a0f' width='100' height='100' rx='20'/%3E%3Ctext x='50' y='72' text-anchor='middle' font-size='60' font-family='serif' fill='%23fbbf24'%3E呪%3C/text%3E%3C/svg%3E">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect fill='%230a0a0f' width='180' height='180' rx='36'/%3E%3Ctext x='90' y='125' text-anchor='middle' font-size='100' font-family='serif' fill='%23fbbf24'%3E呪%3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Noto+Sans+JP:wght@400;600;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js" defer></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none}
:root{
--void:#0a0a0f;--ink:#0f172a;--panel:#111827;--panel2:#1e293b;
--text:#e2e8f0;--dim:#94a3b8;--muted:#64748b;--dark:#475569;
--purple:#6366f1;--purpleL:#a78bfa;--purpleD:#312e81;--purpleBg:#4f46e5;
--red:#ef4444;--redL:#f87171;--green:#22c55e;--greenD:#16a34a;--greenL:#86efac;
--gold:#fbbf24;--goldD:#eab308;--orange:#f97316;--cyan:#06b6d4;
--pink:#f472b6;--pinkD:#ec4899;--violet:#8b5cf6;--blue:#3b82f6;--lime:#84cc16;
--safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;overflow:hidden;background:var(--void);color:var(--text);font-family:'Noto Sans JP','Segoe UI',system-ui,sans-serif;touch-action:manipulation;overscroll-behavior:none}
#app{max-width:480px;margin:0 auto;height:100vh;height:100dvh;position:relative;overflow:hidden;background:var(--void)}
.screen{display:none;position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-top:var(--safe-top);padding-bottom:var(--safe-bottom)}
.screen.active{display:flex;flex-direction:column}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#334155;border-radius:4px}::-webkit-scrollbar-track{background:transparent}
/* Disable hover effects on touch devices */
@media(hover:none){.btn:hover,.hub-btn:hover,.loc-card:hover,.char-card:hover,.tech-btn:hover,.edc-choice:hover{transform:none!important}}

/* ═══ LOADING SCREEN ═══ */
#loadScreen{position:fixed;inset:0;z-index:9999;background:var(--void);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .8s,visibility .8s}
#loadScreen.done{opacity:0;visibility:hidden;pointer-events:none}
.ld-sigil{width:120px;height:120px;border:2px solid #6366f133;border-radius:50%;position:relative;animation:ldSpin 3s linear infinite;margin-bottom:24px}
.ld-sigil::before{content:'';position:absolute;inset:10px;border:1px solid #6366f122;border-radius:50%;animation:ldSpin 2s linear infinite reverse}
.ld-sigil::after{content:'域';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:36px;font-weight:900;color:#6366f1;font-family:'Noto Sans JP',serif;animation:ldPulse 1.5s ease-in-out infinite;text-shadow:0 0 30px #6366f166}
@keyframes ldSpin{to{transform:rotate(360deg)}}
@keyframes ldPulse{0%,100%{opacity:.6;transform:scale(1)}50%{opacity:1;transform:scale(1.1)}}
.ld-bar{width:200px;height:3px;background:#1e293b;border-radius:2px;overflow:hidden;margin-bottom:16px}
.ld-bar-fill{height:100%;width:0%;background:linear-gradient(90deg,#6366f1,#a78bfa,#6366f1);background-size:200% 100%;border-radius:2px;transition:width .3s;animation:ldBarShine 1.5s linear infinite}
@keyframes ldBarShine{to{background-position:-200% 0}}
.ld-text{font-size:11px;color:#64748b;letter-spacing:3px;text-transform:uppercase;min-height:16px;transition:opacity .2s}
.ld-title{font-family:'Russo One',sans-serif;font-size:16px;background:linear-gradient(135deg,#e2e8f0,#6366f1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px;letter-spacing:3px}
.ld-particles{position:absolute;inset:0;overflow:hidden;pointer-events:none}
.ld-p{position:absolute;width:2px;height:2px;background:#6366f1;border-radius:50%;opacity:0;animation:ldFloat 4s ease-in-out infinite}
@keyframes ldFloat{0%{opacity:0;transform:translateY(100vh)}50%{opacity:.6}100%{opacity:0;transform:translateY(-20vh)}}

/* ═══ TITLE BADGES ═══ */
.titles-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.title-card{padding:8px;border-radius:8px;text-align:center;cursor:pointer;border:1px solid;transition:all .15s}
.title-card:disabled{cursor:default}
.title-card.locked{opacity:.35;cursor:not-allowed}
.title-card .tc-icon{font-size:18px}
.title-card .tc-name{font-size:9px;font-weight:700;font-family:'Russo One',sans-serif;margin-top:2px;line-height:1.2}
.title-card .tc-desc{font-size:7px;color:var(--dark);margin-top:2px;line-height:1.2}
.equipped-title{position:relative;overflow:hidden}
.equipped-title::before{content:'';position:absolute;inset:-50%;background:conic-gradient(transparent,rgba(255,255,255,.05),transparent);animation:titleShine 3s linear infinite}
@keyframes titleShine{to{transform:rotate(360deg)}}

/* ═══ TRANSFER MODAL ═══ */
.transfer-section{background:var(--panel);border:1px solid var(--panel2);border-radius:10px;padding:14px;margin-bottom:10px}
.ts-title{font-size:12px;font-weight:700;font-family:'Russo One',sans-serif;margin-bottom:6px}
.ts-desc{font-size:9px;color:var(--muted);margin-bottom:8px}
.transfer-code{font-size:32px;font-weight:900;letter-spacing:8px;font-family:'Russo One',monospace;padding:8px 0;border-radius:8px;border:1px dashed;text-align:center}
.transfer-input{flex:1;padding:10px 12px;font-size:18px;font-weight:900;letter-spacing:6px;text-align:center;background:var(--void);color:var(--text);border:1px solid #334155;border-radius:6px;font-family:'Russo One',monospace;outline:none}
.transfer-input:focus{border-color:var(--purple)}
.status-msg{padding:8px 12px;border-radius:6px;margin-bottom:12px;font-size:11px;text-align:center;border:1px solid}

/* ═══ TITLE — CINEMATIC ═══ */
#title{align-items:center;justify-content:center;text-align:center;padding:20px;background:#050505;position:relative;overflow:hidden}

/* Swirling vortex background */
.t-vortex{position:absolute;inset:0;overflow:hidden;pointer-events:none}
.t-vortex-ring{position:absolute;border-radius:50%;border:1px solid;top:50%;left:50%;transform:translate(-50%,-50%)}
.t-vr1{width:500px;height:500px;border-color:#d4a01808;animation:tVortex 20s linear infinite}
.t-vr2{width:380px;height:380px;border-color:#fbbf240a;animation:tVortex 15s linear infinite reverse}
.t-vr3{width:260px;height:260px;border-color:#b4540808;animation:tVortex 12s linear infinite}
.t-vr4{width:160px;height:160px;border-color:#fbbf240c;animation:tVortex 8s linear infinite reverse}
@keyframes tVortex{to{transform:translate(-50%,-50%) rotate(360deg)}}

/* Swirling energy streams */
.t-stream{position:absolute;top:50%;left:50%;width:2px;transform-origin:0 0;opacity:0;animation:tStream 6s ease-in-out infinite}
@keyframes tStream{0%{opacity:0;height:0}20%{opacity:.35;height:250px}80%{opacity:.1;height:350px}100%{opacity:0;height:0;transform:rotate(360deg)}}

/* Radial pulse */
.t-pulse{position:absolute;top:50%;left:50%;width:300px;height:300px;transform:translate(-50%,-50%);border-radius:50%;background:radial-gradient(circle,#fbbf240a 0%,transparent 70%);animation:tPulse 4s ease-in-out infinite}
@keyframes tPulse{0%,100%{transform:translate(-50%,-50%) scale(.8);opacity:.3}50%{transform:translate(-50%,-50%) scale(1.4);opacity:.7}}
.t-pulse2{position:absolute;top:50%;left:50%;width:200px;height:200px;transform:translate(-50%,-50%);border-radius:50%;background:radial-gradient(circle,#92400e08 0%,transparent 70%);animation:tPulse 3s 1s ease-in-out infinite}

/* Floating particles */
.t-particles{position:absolute;inset:0;overflow:hidden;pointer-events:none}
.t-pt{position:absolute;border-radius:50%;animation:tFloat linear infinite}
@keyframes tFloat{0%{transform:translateY(0) rotate(0deg);opacity:0}10%{opacity:.7}90%{opacity:.3}100%{transform:translateY(-100vh) rotate(720deg);opacity:0}}

/* Orbiting dots */
.t-orbit{position:absolute;top:50%;left:50%;width:200px;height:200px;transform:translate(-50%,-50%);animation:tOrbit 10s linear infinite;pointer-events:none}
.t-orbit2{animation-duration:7s;animation-direction:reverse;width:140px;height:140px}
@keyframes tOrbit{to{transform:translate(-50%,-50%) rotate(360deg)}}
.t-orbit-dot{position:absolute;width:3px;height:3px;border-radius:50%;background:#fbbf24;box-shadow:0 0 6px #fbbf2488}

/* Kanji with glow */
.t-kanji{font-size:14px;letter-spacing:8px;color:#d97706;margin-bottom:8px;text-transform:uppercase;z-index:2;opacity:0;animation:tFadeSlide 1s .3s ease forwards}
@keyframes tFadeSlide{from{opacity:0;transform:translateY(15px);letter-spacing:12px}to{opacity:1;transform:translateY(0);letter-spacing:8px}}

/* Main title — single unified gold-to-white */
.t-main{font-size:clamp(32px,9vw,46px);font-weight:900;font-family:'Russo One',sans-serif;background:linear-gradient(180deg,#fffbeb,#fbbf24 45%,#92400e);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1.1;z-index:2;opacity:0;animation:tTitleIn .8s .6s cubic-bezier(.16,1,.3,1) forwards;filter:drop-shadow(0 0 40px #fbbf2433)}
@keyframes tTitleIn{from{opacity:0;transform:scale(.5);letter-spacing:20px;filter:blur(10px) drop-shadow(0 0 40px #fbbf2433)}to{opacity:1;transform:scale(1);letter-spacing:2px;filter:blur(0) drop-shadow(0 0 40px #fbbf2433)}}

/* Sub title — same family, darker ember */
.t-sub{font-size:28px;font-weight:900;font-family:'Russo One',sans-serif;background:linear-gradient(180deg,#fde68a,#d97706 60%,#78350f);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-top:2px;letter-spacing:6px;z-index:2;opacity:0;animation:tSubIn .8s .9s cubic-bezier(.16,1,.3,1) forwards;filter:drop-shadow(0 0 20px #d9770622)}
@keyframes tSubIn{from{opacity:0;transform:translateY(12px);filter:blur(6px) drop-shadow(0 0 20px #d9770622)}to{opacity:1;transform:translateY(0);filter:blur(0) drop-shadow(0 0 20px #d9770622)}}

/* Divider line that draws itself */
.t-line{width:0;height:1px;background:linear-gradient(90deg,transparent,#fbbf24,#d97706,transparent);margin:20px auto;z-index:2;animation:tLineIn .6s 1.2s ease forwards}
@keyframes tLineIn{to{width:180px}}

/* Description fade in */
.t-desc{color:#78716c;font-size:12px;max-width:300px;line-height:1.7;z-index:2;opacity:0;animation:tFadeUp .6s 1.5s ease forwards}
@keyframes tFadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* Buttons stagger in */
.t-btns{display:flex;flex-direction:column;gap:10px;margin-top:24px;width:100%;max-width:260px;z-index:2;opacity:0;animation:tFadeUp .6s 1.8s ease forwards}

/* Ambient glow behind title */
.t-glow{position:absolute;top:40%;left:50%;width:400px;height:200px;transform:translate(-50%,-50%);background:radial-gradient(ellipse,#fbbf2410 0%,#92400e08 40%,transparent 70%);z-index:1;animation:tGlow 5s ease-in-out infinite;pointer-events:none}
@keyframes tGlow{0%,100%{opacity:.5;transform:translate(-50%,-50%) scale(1)}50%{opacity:1;transform:translate(-50%,-50%) scale(1.2)}}
.btn{padding:14px 0;font-size:16px;font-weight:700;font-family:'Russo One',sans-serif;letter-spacing:2px;border:none;border-radius:8px;cursor:pointer;transition:all .2s;text-align:center;width:100%}
.btn:hover{transform:scale(1.03)}
.btn-primary{background:linear-gradient(135deg,var(--purple),var(--purpleBg));color:#fff;box-shadow:0 0 30px #6366f133}
.btn-green{background:linear-gradient(135deg,var(--green),var(--greenD));color:#fff;box-shadow:0 0 30px #22c55e33}
.btn-red{background:linear-gradient(135deg,var(--red),#dc2626);color:#fff}
.btn-sm{padding:8px 0;font-size:11px;background:transparent;color:var(--dark);border:1px solid var(--panel2);border-radius:6px}
.btn-sm:hover{border-color:var(--purple);color:var(--purple)}
.btn-sm.danger:hover{border-color:var(--red);color:var(--red)}
.save-info{font-size:10px;color:var(--muted);margin-top:-6px;margin-bottom:2px}

/* ═══ CHARACTER SELECT ═══ */
#charSelect{padding:16px;background:var(--void)}
.cs-header{text-align:center;margin-bottom:12px}
.cs-header h2{font-size:20px;color:var(--text);font-family:'Russo One',sans-serif}
.cs-header p{color:var(--muted);font-size:11px}
.back-btn{position:absolute;left:16px;top:16px;background:none;border:none;color:var(--muted);cursor:pointer;font-size:12px;z-index:5}
.role-tabs{display:flex;gap:4px;justify-content:center;flex-wrap:wrap;margin-bottom:12px}
.role-tab{padding:5px 12px;font-size:10px;font-weight:700;background:transparent;color:var(--dark);border:1px solid var(--panel2);border-radius:20px;cursor:pointer;transition:all .15s}
.role-tab.active{background:#6366f122;color:var(--purple);border-color:#6366f155}
.char-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;overflow-y:auto;flex:1;padding-bottom:220px}
.char-card{background:linear-gradient(135deg,var(--panel),#0d1117);border:1px solid var(--panel2);border-radius:10px;padding:10px;cursor:pointer;text-align:center;transition:all .2s}
.char-card:hover,.char-card.sel{border-color:var(--purple)}
.char-card.sel{box-shadow:0 0 16px #6366f122}
.char-card .icon{font-size:28px;margin-bottom:4px}
.char-card .name{font-size:10px;font-weight:700;font-family:'Russo One',sans-serif;color:var(--dim);line-height:1.2}
.char-card .role{font-size:8px;color:var(--dark);text-transform:uppercase;letter-spacing:1px;margin-top:3px}

/* Detail Panel */
.char-detail{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:linear-gradient(180deg,#0f172aee,var(--ink));border-top:2px solid #6366f166;padding:16px;z-index:50;backdrop-filter:blur(12px);animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateX(-50%) translateY(100%);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}
.cd-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.cd-top .icon{font-size:34px}
.cd-name{font-size:16px;font-weight:700;font-family:'Russo One',sans-serif}
.cd-desc{font-size:10px;color:var(--dim);margin-top:2px;line-height:1.4}
.stat-row{display:flex;gap:6px;margin-bottom:10px}
.stat-box{flex:1;border-radius:6px;padding:5px 0;text-align:center}
.stat-box .label{font-size:8px;color:var(--muted)}
.stat-box .val{font-size:14px;font-weight:900;font-family:'Russo One',sans-serif}
.tech-preview{display:flex;gap:4px;overflow-x:auto;margin-bottom:12px;padding-bottom:4px}
.tech-pill{min-width:80px;flex:0 0 auto;background:#1e293b55;border-radius:6px;padding:5px 6px;text-align:center;border:1px solid #334155;font-size:8px;font-weight:700;color:#c7d2fe;line-height:1.2}
.tech-pill.domain{border-color:var(--purple);color:var(--purple);background:#6366f115}
.tech-pill .sub{font-size:7px;color:var(--dark);margin-top:1px;font-family:monospace;font-weight:400}

/* ═══ HUB ═══ */
#hub{padding:16px;background:var(--void)}
.player-bar{background:linear-gradient(135deg,var(--panel),var(--ink));border:1px solid var(--panel2);border-radius:12px;padding:14px;margin-bottom:12px}
.pb-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.pb-info{display:flex;align-items:center;gap:8px}
.pb-info .icon{font-size:24px}
.pb-name{font-size:14px;font-weight:700;font-family:'Russo One',sans-serif}
.pb-grade{font-size:10px;color:var(--muted)}
.pb-gold{font-size:13px;color:var(--gold);font-weight:700;font-family:monospace}
.title-badge{margin-top:3px;padding:2px 8px;font-size:8px;font-weight:700;border-radius:10px;cursor:pointer;display:inline-flex;align-items:center;gap:3px;border:1px solid}

/* Bars */
.bar-wrap{margin-bottom:4px}
.bar-label{font-size:11px;color:var(--dim);margin-bottom:2px}
.bar-track{width:100%;height:14px;background:var(--panel2);border-radius:4px;overflow:hidden;border:1px solid #334155}
.bar-fill{height:100%;border-radius:4px;transition:width .4s}
.bar-text{font-size:10px;color:var(--muted);text-align:right;margin-top:1px;font-family:monospace}
.bar-hp .bar-fill{background:linear-gradient(90deg,var(--green),#4ade80)}
.bar-ce .bar-fill{background:linear-gradient(90deg,var(--purple),var(--purpleL))}
.bar-xp{margin-top:4px}
.bar-xp .bar-track{height:6px}
.bar-xp .bar-fill{background:linear-gradient(90deg,var(--gold),#f59e0b)}

/* Section Toggle */
.section-toggle{display:flex;align-items:center;justify-content:space-between;width:100%;background:none;border:none;padding:0 0 8px 0;cursor:pointer}
.section-toggle h3{font-size:14px;color:var(--text);font-family:'Russo One',sans-serif}
.section-meta{font-size:10px;color:var(--muted);display:flex;align-items:center;gap:4px}
.section-meta .arrow{display:inline-block;transition:transform .2s;font-size:12px}
.section-content{overflow:hidden;transition:max-height .3s ease}

/* Location Grid */
.loc-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.loc-card{border-radius:10px;padding:12px;cursor:pointer;text-align:left;transition:all .2s;border:1px solid #334155}
.loc-card:hover{border-color:var(--purple)}
.loc-card.locked{opacity:.4;cursor:not-allowed}
.loc-card .icon{font-size:22px;margin-bottom:4px}
.loc-card .name{font-size:12px;font-weight:700;font-family:'Russo One',sans-serif;color:var(--text)}
.loc-card .desc{font-size:10px;color:var(--muted);margin-top:2px;line-height:1.3}

/* Hub Buttons */
.hub-row{display:flex;gap:6px;margin-bottom:6px}
.hub-btn{flex:1;padding:12px 0;font-size:11px;font-weight:700;border-radius:8px;cursor:pointer;transition:all .2s;text-align:center;border:1px solid;min-height:44px;display:flex;align-items:center;justify-content:center}

/* Quest Cards */
.quest-card{border-radius:8px;padding:10px;margin-bottom:6px;border:1px solid var(--panel2)}
.quest-card.done{background:#0a1a0a;border-color:#16a34a33}
.quest-card.claimable{background:#1a1a05;border-color:#fbbf2444}
.qc-top{display:flex;justify-content:space-between;align-items:center}
.qc-name{font-size:12px;font-weight:700;font-family:'Russo One',sans-serif}
.qc-desc{font-size:10px;color:var(--muted);margin-top:2px}
.qc-bar{width:100%;height:4px;background:var(--panel2);border-radius:2px;overflow:hidden;margin-top:4px}
.qc-bar-fill{height:100%;border-radius:2px}
.qc-prog{font-size:9px;color:var(--muted);margin-top:1px;font-family:monospace}
.claim-btn{font-size:11px;padding:6px 14px;background:var(--greenD);color:#fff;border:none;border-radius:4px;cursor:pointer;font-weight:700;animation:pulse 1.5s infinite;min-height:36px}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}

/* ═══ BATTLE ═══ */
#battle{padding:16px;position:relative;overflow:hidden}
.battle-loc{text-align:center;font-size:10px;color:var(--muted);margin-bottom:12px;letter-spacing:2px;text-transform:uppercase}
.battle-arena{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;gap:8px}
.fighter-box{flex:1;background:#111827aa;border-radius:10px;padding:10px;backdrop-filter:blur(8px);border:1px solid}
.fighter-box .top{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.fighter-box .icon{font-size:28px}
.fighter-box .fname{font-size:11px;font-weight:700;font-family:'Russo One',sans-serif}
.fighter-box .flv{font-size:9px;color:var(--muted)}
.vs{font-size:16px;font-weight:900;color:var(--red);align-self:center;font-family:'Russo One',sans-serif;text-shadow:0 0 10px #ef444444}

/* Battle Log */
.blog{background:#0a0a0fcc;border:1px solid var(--panel2);border-radius:8px;padding:8px;height:100px;overflow-y:auto;margin-bottom:12px;font-size:11px}
.blog div{margin-bottom:2px;line-height:1.4}
.blog .crit{color:var(--gold)}.blog .attack{color:#60a5fa}.blog .enemy{color:var(--redL)}
.blog .heal{color:#4ade80}.blog .victory{color:var(--green)}.blog .level{color:var(--gold)}
.blog .drop{color:var(--purpleL)}.blog .alert{color:var(--orange)}.blog .buff{color:#c084fc}
.blog .info{color:var(--dim)}

/* Technique Buttons */
.tech-grid{display:grid;gap:5px;margin-bottom:8px}
.tech-btn{padding:10px 4px;font-size:10px;font-weight:700;border-radius:8px;cursor:pointer;border:1px solid var(--purple);background:linear-gradient(135deg,var(--purpleD),#1e1b4b);color:#c7d2fe;transition:all .15s;text-align:center;min-height:44px}
.tech-btn:hover{background:linear-gradient(135deg,#4338ca,var(--purpleD))}
.tech-btn.domain{border-color:var(--purple);color:var(--purple);background:linear-gradient(135deg,#6366f133,#6366f111);box-shadow:0 0 12px #6366f122}
.tech-btn:disabled{background:#111;color:var(--dark);border-color:var(--panel2);cursor:not-allowed;box-shadow:none}
.tech-sub{font-size:8px;color:var(--purple);margin-top:2px}

/* Quick Items Row */
.qi-row{display:flex;gap:6px;margin-bottom:6px}
.qi-btn{flex:1;padding:10px 4px;font-size:10px;border-radius:6px;cursor:pointer;border:1px solid #16a34a33;background:#14532d;color:var(--greenL);text-align:center;min-height:40px}
.qi-btn:disabled{background:#111;color:var(--dark);border-color:var(--panel2);cursor:not-allowed}

/* Binding Vow Row */

/* Battle Result */
.battle-result{text-align:center;padding:16px}
.result-text{font-size:24px;font-weight:900;font-family:'Russo One',sans-serif;margin-bottom:8px}
.result-btns{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.result-btn{padding:12px 24px;font-size:13px;font-weight:700;font-family:'Russo One',sans-serif;border:none;border-radius:8px;cursor:pointer;min-height:44px}

/* ═══ DOMAIN EXPANSION ═══ */
.domain-overlay{position:fixed;inset:0;z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;animation:domFadeIn .4s ease forwards}
@keyframes domFadeIn{from{opacity:0}to{opacity:1}}
.dom-pulse{position:absolute;inset:0;animation:domPulse 2s ease-in-out infinite}
@keyframes domPulse{0%,100%{transform:scale(1);opacity:.6}50%{transform:scale(1.15);opacity:1}}
.dom-ring{position:absolute;width:300px;height:300px;border:2px solid;border-radius:50%;animation:domSpin 4s linear infinite}
@keyframes domSpin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.dom-ring2{position:absolute;width:220px;height:220px;border:1px solid;border-radius:50%;animation:domSpin 3s linear infinite reverse}
.dom-ray{position:absolute;top:50%;left:50%;width:1px;transform-origin:top center;transition:height .8s ease}
.dom-hands{display:flex;flex-direction:column;align-items:center;z-index:10;animation:domHandsIn .8s ease forwards}
@keyframes domHandsIn{0%{opacity:0;transform:scale(.3) translateY(40px)}60%{opacity:1;transform:scale(1.1) translateY(-5px)}100%{opacity:1;transform:scale(1) translateY(0)}}
.dom-hands-icon{font-size:60px;animation:domHandsPulse .6s ease-in-out infinite alternate}
@keyframes domHandsPulse{0%{transform:scale(1);filter:brightness(1)}100%{transform:scale(1.08);filter:brightness(1.3)}}
.dom-label{margin-top:16px;font-size:12px;letter-spacing:6px;text-transform:uppercase;font-family:'Russo One',sans-serif;animation:domTextGlow 1s ease-in-out infinite alternate}
@keyframes domTextGlow{0%{opacity:.5;letter-spacing:6px}100%{opacity:1;letter-spacing:10px}}
.dom-kanji{font-size:80px;font-weight:900;font-family:'Noto Sans JP',serif;z-index:10;animation:domKanjiIn 1s cubic-bezier(.16,1,.3,1) forwards;letter-spacing:8px}
@keyframes domKanjiIn{0%{opacity:0;transform:scale(3) rotate(-5deg);filter:blur(20px)}50%{opacity:1;transform:scale(1.05);filter:blur(0)}70%{transform:scale(.98)}100%{opacity:1;transform:scale(1);filter:blur(0)}}
.dom-slash{width:0;height:2px;margin-top:12px;animation:domSlash .6s .3s ease forwards;z-index:10}
@keyframes domSlash{0%{width:0;opacity:0}100%{width:240px;opacity:1}}
.dom-subname{font-size:18px;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:#fff;font-family:'Russo One',sans-serif;animation:domSubIn .6s ease forwards;z-index:10;margin-top:10px}
@keyframes domSubIn{0%{opacity:0;transform:translateY(15px);letter-spacing:2px}100%{opacity:1;transform:translateY(0);letter-spacing:4px}}
.dom-impact{position:absolute;inset:0;z-index:20;animation:domImpact .8s ease-out forwards}
@keyframes domImpact{0%{opacity:0;transform:scale(.2)}30%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(1.5)}}
.dom-particle{position:absolute;border-radius:50%;animation:domFloat 3s ease-in-out infinite alternate}
@keyframes domFloat{0%{transform:translateY(0) scale(1);opacity:.2}100%{transform:translateY(-30px) scale(1.5);opacity:.6}}

/* ═══ ENEMY DOMAIN CHALLENGE ═══ */
.edc-overlay{position:fixed;inset:0;z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(6px)}
.edc-choices{display:flex;flex-direction:column;gap:8px;width:100%;max-width:320px;z-index:10}
.edc-choice{padding:14px 16px;border-radius:10px;border:1px solid;cursor:pointer;font-family:'Russo One',sans-serif;font-size:12px;text-align:left;transition:all .2s;min-height:48px}
.edc-choice:disabled{opacity:.4;cursor:not-allowed}
.edc-choice .sub{font-size:9px;opacity:.7;margin-top:2px;font-family:'Noto Sans JP',sans-serif;font-weight:400}

/* ═══ MODALS ═══ */
.modal-bg{position:fixed;inset:0;background:#000000cc;display:flex;align-items:center;justify-content:center;z-index:100;padding:16px;backdrop-filter:blur(4px)}
.modal{background:var(--ink);border:1px solid var(--panel2);border-radius:16px;padding:20px;max-width:400px;width:100%;max-height:85vh;overflow-y:auto}
.modal h3{font-size:16px;color:var(--text);font-family:'Russo One',sans-serif;margin-bottom:12px}
.modal-close{width:100%;padding:12px;margin-top:8px;background:var(--panel2);color:var(--dim);border:none;border-radius:8px;cursor:pointer;font-size:13px;min-height:44px}
.modal-close:hover{background:#334155}

/* Shop Item */
.shop-item{display:flex;justify-content:space-between;align-items:center;padding:8px;background:var(--panel);border-radius:8px;margin-bottom:4px;border:1px solid var(--panel2)}
.si-info{flex:1;min-width:0}
.si-name{font-size:11px;font-weight:600;color:var(--text)}
.si-desc{font-size:9px;color:var(--muted)}
.si-stats{font-size:8px;color:var(--green);font-family:monospace;margin-top:1px}
.buy-btn{padding:6px 14px;font-size:10px;font-weight:700;border:none;border-radius:4px;cursor:pointer;min-height:36px}
.buy-btn:disabled{background:#333;color:#555;cursor:not-allowed}

/* Equipment Slots */
.equip-slots{display:flex;gap:6px;margin-bottom:12px}
.equip-slot{flex:1;border-radius:8px;padding:8px;text-align:center;min-height:60px;display:flex;flex-direction:column;justify-content:center;border:1px solid}
.equip-slot .icon{font-size:18px}.equip-slot .ename{font-size:9px;font-weight:700;line-height:1.2;margin-top:2px}
.equip-slot .estats{font-size:7px;color:var(--muted);font-family:monospace;margin-top:1px}
.unequip-btn{margin-top:3px;padding:2px 6px;font-size:8px;background:#ef444433;color:var(--redL);border:1px solid #ef444444;border-radius:3px;cursor:pointer}

/* Inventory Item */
.inv-item{display:flex;justify-content:space-between;align-items:center;padding:8px;background:var(--panel);border-radius:8px;margin-bottom:4px;border:1px solid var(--panel2)}
.inv-btns{display:flex;gap:4px;margin-left:6px;flex-shrink:0}
.inv-btn{padding:4px 8px;font-size:9px;font-weight:700;color:#fff;border:none;border-radius:4px;cursor:pointer}

/* Craft */
.craft-item{padding:10px;border-radius:8px;margin-bottom:6px;border:1px solid var(--panel2)}
.craft-item.cancraft{background:#1a0f20;border-color:#f472b644}
.ci-top{display:flex;justify-content:space-between;align-items:center}
.ci-info{flex:1}.ci-name{font-size:11px;font-weight:700;font-family:'Russo One',sans-serif}
.ci-desc{font-size:9px;color:var(--muted);margin-top:2px}
.ci-mats{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.ci-mat{font-size:8px;padding:2px 6px;border-radius:4px;font-family:monospace;border:1px solid}
.craft-btn{padding:6px 12px;font-size:10px;font-weight:700;flex-shrink:0;margin-left:8px;border:none;border-radius:6px;cursor:pointer}
.craft-btn:disabled{background:#333;color:#555;cursor:not-allowed}

/* Titles */
.titles-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.title-card{padding:8px;border-radius:8px;text-align:center;cursor:pointer;border:1px solid;transition:all .15s}
.title-card:disabled{cursor:default}
.title-card.locked{opacity:.35}
.title-card .icon{font-size:18px}.title-card .tname{font-size:9px;font-weight:700;font-family:'Russo One',sans-serif;margin-top:2px;line-height:1.2}
.title-card .tdesc{font-size:7px;color:var(--dark);margin-top:2px;line-height:1.2}

/* Transfer Modal */
.transfer-section{background:var(--panel);border:1px solid var(--panel2);border-radius:10px;padding:14px;margin-bottom:10px}
.ts-title{font-size:12px;font-weight:700;font-family:'Russo One',sans-serif;margin-bottom:6px}
.ts-desc{font-size:9px;color:var(--muted);margin-bottom:8px}
.transfer-code{font-size:32px;font-weight:900;letter-spacing:8px;font-family:'Russo One',monospace;padding:8px 0;border-radius:8px;border:1px dashed;text-align:center}
.transfer-input{flex:1;padding:10px 12px;font-size:18px;font-weight:900;letter-spacing:6px;text-align:center;background:var(--void);color:var(--text);border:1px solid #334155;border-radius:6px;font-family:'Russo One',monospace;outline:none}
.transfer-input:focus{border-color:var(--purple)}
.status-msg{padding:8px 12px;border-radius:6px;margin-bottom:12px;font-size:11px;text-align:center;border:1px solid}

/* PvP */
#pvp{padding:16px;background:var(--void)}
.pvp-build{background:linear-gradient(135deg,var(--panel),var(--ink));border:1px solid #ef444433;border-radius:12px;padding:14px;margin-bottom:12px}
.pvp-opp{background:var(--panel);border:1px solid var(--panel2);border-radius:10px;padding:12px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.pvp-how{margin-top:12px;padding:12px;background:var(--panel);border-radius:8px;border:1px solid var(--panel2);font-size:10px;color:var(--dim);line-height:1.5}

/* ═══ FLOATING DAMAGE ═══ */
.float-dmg{position:absolute;font-weight:900;font-family:'Russo One',sans-serif;pointer-events:none;z-index:999;animation:floatUp 1s ease-out forwards}
@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-60px) scale(1.3)}}

/* ═══ SAVE INDICATOR ═══ */
.save-ind{position:fixed;top:12px;right:12px;z-index:200;padding:5px 12px;border-radius:6px;font-size:10px;font-weight:700;animation:fadeIn .2s ease;border:1px solid}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* Battle log styling */
.blog-msg{padding:4px 8px;border-radius:4px;font-size:10px;animation:slideUp .2s ease;margin-bottom:2px;border-left:2px solid transparent}
.blog-msg.victory{color:#22c55e;background:#22c55e08;border-left-color:#22c55e}
.blog-msg.attack{color:#f97316;background:#f9731605}
.blog-msg.crit{color:#fbbf24;background:#fbbf2410;font-weight:700;border-left-color:#fbbf24}
.blog-msg.enemy{color:#ef4444;background:#ef444408;border-left-color:#ef4444}
.blog-msg.heal{color:#22c55e;background:#22c55e08;border-left-color:#22c55e}
.blog-msg.buff{color:#6366f1;background:#6366f108;border-left-color:#6366f1}
.blog-msg.drop{color:#a78bfa;background:#a78bfa08;border-left-color:#a78bfa}
.blog-msg.alert{color:#f97316;background:#f9731608;font-weight:700;border-left-color:#f97316}
.blog-msg.level{color:#fbbf24;background:#fbbf2410;font-weight:700;border-left-color:#fbbf24}
.blog-msg.info{color:#64748b}

/* ═══ TECHNIQUE FLASH ═══ */
.tech-flash{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:#00000088;z-index:50}
.tech-flash-text{font-size:20px;font-weight:900;color:#fff;font-family:'Russo One',sans-serif;text-shadow:0 0 30px var(--purple),0 0 60px var(--purple);animation:techFlash .6s ease forwards}
@keyframes techFlash{0%{opacity:0;transform:scale(.5)}30%{opacity:1;transform:scale(1.2)}100%{opacity:0;transform:scale(2)}}

/* Sync Button */
.sync-btn{width:100%;padding:6px 0;margin-bottom:8px;font-size:10px;font-weight:700;background:#6366f115;color:var(--purple);border:1px solid #6366f133;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px}

/* Screen shake */
.shaking{animation:screenShake .3s ease-in-out}
@keyframes screenShake{0%,100%{transform:translate(0)}20%{transform:translate(-4px,2px)}40%{transform:translate(4px,-2px)}60%{transform:translate(-2px,4px)}80%{transform:translate(2px,-4px)}}

/* Mobile active states */
.btn:active{transform:scale(.97)!important;opacity:.85}
.hub-btn:active{transform:scale(.95)!important;opacity:.8}
.tech-btn:active:not(:disabled){transform:scale(.95)!important;filter:brightness(1.2)}
.qi-btn:active:not(:disabled){transform:scale(.95)!important}
.loc-card:active:not(.locked){transform:scale(.97)!important;opacity:.85}
.char-card:active{transform:scale(.95)!important}
.result-btn:active{transform:scale(.95)!important;opacity:.85}
.edc-choice:active:not(:disabled){transform:scale(.97)!important;opacity:.85}
.modal-close:active{opacity:.7}
.claim-btn:active{transform:scale(.95)!important}
.buy-btn:active:not(:disabled){transform:scale(.9)!important}
button{-webkit-user-select:none;user-select:none}
</style>

<body>
<div id="loadScreen">
  <div class="ld-particles" id="ldParticles"></div>
  <div class="ld-sigil"></div>
  <div class="ld-title">CURSED LINEAGE</div>
  <div class="ld-bar"><div class="ld-bar-fill" id="ldFill"></div></div>
  <div class="ld-text" id="ldText">Channeling cursed energy...</div>
</div>
<div id="app">
  <div id="title" class="screen active"></div>
  <div id="charSelect" class="screen"></div>
  <div id="hub" class="screen"></div>
  <div id="battle" class="screen"></div>
  <div id="pvp" class="screen"></div>
  <div id="overlays"></div>
  <div id="saveInd"></div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// SERVER CONFIG — Change this URL after deploying your backend
// ═══════════════════════════════════════════════════════════════

const API_URL = "https://cursed-lineage-server.onrender.com"; // Your backend server

// Auto-detect if game is hosted on the backend server itself
(function autoDetectServer(){
  if(API_URL)return;
  if(window.location.hostname!=="localhost"&&!window.location.protocol.startsWith("file")){
    // Game is hosted on a server — try if the API is on the same origin
    fetch(window.location.origin+"/api/stats").then(r=>r.json()).then(d=>{
      if(d&&d.totalPlayers!==undefined){
        localStorage.setItem("cursed_lineage_api_url",window.location.origin);
        window.location.reload();
      }
    }).catch(()=>{});
  }
})();
let serverOnline = false;
let myPlayerId = null;
let myFriendCode = null;

async function api(method, path, body = null) {
  if (!API_URL) return null;
  try {
    const opts = { method, headers: { "Content-Type": "application/json" } };
    if (body) opts.body = JSON.stringify(body);
    const res = await fetch(API_URL + path, opts);
    if (!res.ok) return null;
    return await res.json();
  } catch (e) { return null; }
}

async function checkServer() {
  if (!API_URL) { serverOnline = false; return; }
  try {
    const r = await api("GET", "/api/stats");
    serverOnline = !!(r && r.totalPlayers !== undefined);
    if (serverOnline) console.log("[CursedLineage] Server online! Players:", r.totalPlayers);
  } catch (e) { serverOnline = false; }
}

async function syncToServer() {
  if (!serverOnline || !G.player || !pvpArenaName) return;
  try {
    const eb = getEquipBonus();
    const r = await api("POST", "/api/player", {
      arenaName: pvpArenaName, classKey: G.player.classKey, charName: G.player.name,
      level: G.player.level, icon: getPlayerIcon(), color: G.player.color,
      atk: G.player.atk + eb.atk, def: G.player.def + eb.def,
      maxHP: G.player.maxHP, maxCE: G.player.maxCE,
      techniques: G.player.techniques, title: G.equippedTitle, skin: G.equippedSkin,
      totalKills: G.totalKills, bestStreak: G.stats.bestArenaStreak || 0,
      totalArenaWins: G.stats.totalArenaWins || 0,
      totalDmg: G.stats.totalDmgDealt || 0, highestCrit: G.stats.highestCrit || 0,
      bossRushClears: G.stats.bossRushClears || 0
    });
    if (r && r.ok) {
      myPlayerId = r.playerId;
      myFriendCode = r.friendCode;
    }
  } catch (e) {}
}

async function findServerOpponents() {
  if (!serverOnline || !pvpArenaName) return [];
  try {
    // Join the queue first
    const eb = getEquipBonus();
    await api("POST", "/api/pvp/queue", {
      arenaName: pvpArenaName, classKey: G.player.classKey, charName: G.player.name,
      level: G.player.level, icon: getPlayerIcon(), color: G.player.color,
      atk: G.player.atk + eb.atk, def: G.player.def + eb.def,
      maxHP: G.player.maxHP, maxCE: G.player.maxCE,
      techniques: G.player.techniques, title: G.equippedTitle,
      skin: G.equippedSkin, streak: G.stats.bestArenaStreak || 0
    });
    // Find opponents
    const r = await api("GET", `/api/pvp/opponents/${encodeURIComponent(pvpArenaName)}/${G.player.level}`);
    if (r && r.opponents) {
      return r.opponents.map(o => ({
        player: {
          classKey: o.classKey, name: o.charName, level: o.level,
          hp: o.maxHP, maxHP: o.maxHP, atk: o.atk, def: o.def,
          ce: o.maxCE, maxCE: o.maxCE, techniques: o.techniques,
          icon: o.icon, color: o.color
        },
        equipment: { weapon: null, accessory: null },
        isBot: false, isReal: true, isOffline: o.isOffline,
        arenaName: o.arenaName, streak: o.streak || 0,
        equippedTitle: o.title || "Grade 4 Sorcerer"
      }));
    }
  } catch (e) {}
  return [];
}

async function serverAddFriend(code) {
  if (!serverOnline || !myPlayerId) return { ok: false, msg: "Not connected to server" };
  try {
    const r = await api("POST", "/api/friends/add", { playerId: myPlayerId, friendCode: code });
    if (r && r.ok) return { ok: true, msg: `Added ${r.friend.arenaName}!`, friend: r.friend };
    if (r && r.error) return { ok: false, msg: r.error };
  } catch (e) {}
  return { ok: false, msg: "Connection failed" };
}

async function serverGetFriends() {
  if (!serverOnline || !myPlayerId) return [];
  try {
    const r = await api("GET", `/api/friends/${myPlayerId}`);
    if (r && r.friends) return r.friends;
  } catch (e) {}
  return [];
}

async function serverGetLeaderboard(sort = "kills") {
  if (!serverOnline) return [];
  try {
    const r = await api("GET", `/api/leaderboard?sort=${sort}`);
    if (r && r.leaderboard) return r.leaderboard;
  } catch (e) {}
  return [];
}

// ═══════════════════════════════════════════════════════════════
// GAME DATA — All from the React version
// ═══════════════════════════════════════════════════════════════

const CHARACTERS={
gojo:{name:"Gojo Satoru",baseHP:110,baseATK:22,baseDEF:22,baseCE:150,techniques:["Infinity","Blue","Red","Hollow Purple","Unlimited Void"],desc:"The strongest. Limitless + Six Eyes.",icon:"♾️",color:"#06b6d4",role:"sorcerer"},

// ═══════════════════════════════════════════════════════════════
// UNIVERSAL STORAGE — works standalone (localStorage) or in Claude (window.storage)
// ═══════════════════════════════════════════════════════════════


const DB=(()=>{
  // Detect Claude's persistent storage API specifically (not browser's Storage)
  const hasCloud=typeof window!=='undefined'&&window.storage&&typeof window.storage.get==='function'&&typeof window.storage.set==='function'&&typeof window.storage.delete==='function';
  // In-memory fallback if both cloud and localStorage fail
  const mem={};
  return{
    async get(key,shared){
      const k=(shared?"shared:":"")+key;
      if(hasCloud){try{const r=await window.storage.get(key,shared);if(r&&r.value)return r.value}catch(e){}}
      try{const v=localStorage.getItem(k);if(v!==null)return v}catch(e){}
      return mem[k]||null;
    },
    async set(key,value,shared){
      const k=(shared?"shared:":"")+key;
      mem[k]=value;
      if(hasCloud){try{const r=await window.storage.set(key,value,shared);if(r)return true}catch(e){}}
      try{localStorage.setItem(k,value);return true}catch(e){}
      return true; // mem fallback always works
    },
    async del(key,shared){
      const k=(shared?"shared:":"")+key;
      delete mem[k];
      if(hasCloud){try{await window.storage.delete(key,shared)}catch(e){}}
      try{localStorage.removeItem(k)}catch(e){}
    },
    async list(prefix,shared){
      if(hasCloud){try{const r=await window.storage.list(prefix,shared);if(r&&r.keys)return r.keys}catch(e){}}
      try{const keys=[];for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);const pfx=(shared?"shared:":"")+prefix;if(k.startsWith(pfx))keys.push(shared?k.replace("shared:",""):k)}return keys}catch(e){}
      return Object.keys(mem).filter(k=>k.startsWith((shared?"shared:":"")+prefix)).map(k=>shared?k.replace("shared:",""):k);
    }
  };
})();

function xpForLevel(lv){return Math.floor(40*Math.pow(lv,1.35))}
function gradeTitle(lv){if(lv>=15)return"Special Grade";if(lv>=10)return"Grade 1";if(lv>=7)return"Grade 2";if(lv>=4)return"Grade 3";return"Grade 4"}
function getEnemyForGrade(grade){
  const pool=ENEMIES.filter(e=>e.grade===grade);
  const base={...pool[Math.floor(Math.random()*pool.length)]};
  // Scale enemy to player level for a fair fight
  const lv=G.player?G.player.level:1;
  const scale=1+Math.max(0,lv-3)*0.06;
  base.hp=Math.floor(base.hp*scale);base.maxHP=base.hp;
  base.atk=Math.floor(base.atk*scale);base.def=Math.floor(base.def*scale);
  base.xp=Math.floor(base.xp*(1+lv*0.05));
  return base;
}
function getEquipBonus(){let a=0,d=0,c=0;[G.equipment.weapon,G.equipment.accessory].forEach(n=>{if(n&&ITEMS[n]&&ITEMS[n].type==="equipment"){a+=(ITEMS[n].bonusATK||0);d+=(ITEMS[n].bonusDEF||0);c+=(ITEMS[n].bonusCE||0)}});return{atk:a,def:d,ce:c}}
function calcDamage(atk,def,power,buff=1,extraCrit=0){const base=Math.max(1,atk*power*buff-def*.5);const v=.85+Math.random()*.3;const crit=Math.random()<(.15+extraCrit);return{dmg:Math.floor(base*v*(crit?2:1)),crit}}
function barPct(cur,max){return Math.max(0,Math.min(100,(cur/max)*100))}

function hpBarColor(pct){return pct>50?"#22c55e":pct>25?"#eab308":"#ef4444"}

function syncQuestProgress(){
  const p=G.player;if(!p)return;
  const fing=G.inventory["Sukuna Finger"]||0;

  // Auto-add quests from higher tiers when player levels up
  const available=getActiveQuests();
  available.forEach(aq=>{
    if(!G.questLog.find(q=>q.id===aq.id)){
      G.questLog.push({...aq});
    }
  });

  G.questLog.forEach(q=>{
    if(q.done)return;let prog=q.progress;
    switch(q.track){
      case"kills":prog=G.totalKills;break;case"level":prog=p.level;break;case"fingers":prog=fing;break;
      case"totalGold":prog=G.stats.totalGold||0;break;case"crits":prog=G.stats.crits||0;break;
      case"crafts":prog=G.stats.crafts||0;break;case"domainCounters":prog=G.stats.domainCounters||0;break;
      case"domainUses":prog=G.stats.domainUses||0;break;case"shibuya":prog=G.stats.shibuyaWins||0;break;
      case"culling":prog=G.stats.cullingWins||0;break;case"sukuna20":prog=G.stats.sukuna20||0;break;
      case"totalArenaWins":prog=G.stats.totalArenaWins||0;break;
      case"bestArenaStreak":prog=G.stats.bestArenaStreak||0;break;
    }
    q.progress=Math.min(q.target,Math.max(q.progress,prog));
  });
}

function renderTitle(){
  const has=!!G.player;
  const titleData=has&&TITLES[G.equippedTitle]?TITLES[G.equippedTitle]:null;

  // Generate swirling particles
  let particles="";
  for(let i=0;i<30;i++){
    const x=Math.random()*100,size=1+Math.random()*3,dur=4+Math.random()*8,delay=Math.random()*6;
    const color=Math.random()>.5?"#fbbf24":Math.random()>.3?"#d97706":"#92400e";
    particles+=`<div class="t-pt" style="left:${x}%;bottom:-5%;width:${size}px;height:${size}px;background:${color};box-shadow:0 0 ${size*3}px ${color}88;animation-duration:${dur}s;animation-delay:${delay}s"></div>`;
  }

  // Generate swirling energy streams
  let streams="";
  for(let i=0;i<8;i++){
    const rot=i*45,delay=i*.8,color=i%3===0?"#fbbf2418":i%3===1?"#d9770615":"#92400e12";
    streams+=`<div class="t-stream" style="transform:rotate(${rot}deg);background:linear-gradient(180deg,${color},transparent);animation-delay:${delay}s"></div>`;
  }

  // Orbiting dots
  let orbit1="",orbit2="";

function selectCharacter(key){
  const c=CHARACTERS[key];
  G.player={classKey:key,name:c.name,level:1,xp:0,xpNext:xpForLevel(2),hp:c.baseHP,maxHP:c.baseHP,atk:c.baseATK,def:c.baseDEF,ce:c.baseCE,maxCE:c.baseCE,techniques:c.techniques,icon:c.icon,color:c.color};
  G.gold=50;G.inventory={"Healing Charm":3,"CE Pill":2};G.questLog=DEFAULT_QUESTS.map(q=>({...q}));
  G.totalKills=0;G.encounterCount=0;G.equipment={weapon:null,accessory:null};
  G.stats={totalGold:0,crits:0,crafts:0,domainCounters:0,domainUses:0,shibuyaWins:0,cullingWins:0,sukuna20:0,vowUses:0,locationsVisited:[],bestArenaStreak:0,totalArenaWins:0};

}

      {name:"Slay 4 Spirits",desc:"Defeat 4 Grade 3-4 spirits",target:4,track:"dailyKills",reward:{gold:60,xp:40}},
      {name:"Land 3 Crits",desc:"Get 3 critical hits",target:3,track:"dailyCrits",reward:{gold:50,xp:35}},
      {name:"Earn 100 Gold",desc:"Collect 100 gold",target:100,track:"dailyGold",reward:{gold:60,xp:40}},

        ${cl?`<button class="claim-btn" onclick="claimQuest(${q.id})">CLAIM</button>`:""}</div>
        ${!q.done?`<div class="qc-bar"><div class="qc-bar-fill" style="width:${pct}%;background:${cl?"#fbbf24":"#6366f1"}"></div></div><div class="qc-prog">${q.progress}/${q.target}</div>`:""}
      </div>`}).join("")}
    </div></div>`;

  document.getElementById("hub").innerHTML=h;
}

function restPlayer(){G.player.hp=G.player.maxHP;G.player.ce=G.player.maxCE;saveGame();renderHub()}

function claimQuest(id){
  const q=G.questLog.find(x=>x.id===id);if(!q||q.done||q.progress<q.target)return;
  q.done=true;
  if(q.reward.gold)G.gold+=q.reward.gold;
  if(q.reward.xp){G.player.xp+=q.reward.xp;levelUp()}
  saveGame();renderHub();
}

function claimDailyQuest(id){
  const q=(G.dailyQuests||[]).find(x=>x.id===id);if(!q||q.done||q.progress<q.target)return;
  q.done=true;
  if(q.reward.gold)G.gold+=q.reward.gold;
  if(q.reward.xp){G.player.xp+=q.reward.xp;levelUp()}
  saveGame();renderHub();
}

function levelUp(){
  while(G.player.xp>=G.player.xpNext){
    G.player.xp-=G.player.xpNext;G.player.level++;G.player.xpNext=xpForLevel(G.player.level+1);
    G.player.maxHP+=12;G.player.hp=G.player.maxHP;G.player.atk+=3;G.player.def+=2;
    G.player.maxCE+=8;G.player.ce=G.player.maxCE;
    addBattleLog(`⬆ LEVEL UP! Now ${gradeTitle(G.player.level)} (Lv.${G.player.level})`,"level");
  }
}

function startBattle(locIdx){
  G.currentLocation=locIdx;
  const loc=LOCATIONS[locIdx];
  const grade=loc.enemyGrades[Math.floor(Math.random()*loc.enemyGrades.length)];
  const e=getEnemyForGrade(grade);
  G.enemy=e;G.battleLog=[];G.battleResult=null;G.battleTurn="player";G.atkBuff=1;
  G.battleTurnCount=0;G.enemyDomainUsed=false;G.bindingVow=null;G.encounterCount++;
  G.awakened=false;G.dailyMod=null;
  inArenaMode=false;arenaStreak=0;
  // Track location visited
  if(!G.stats.locationsVisited)G.stats.locationsVisited=[];
  if(!G.stats.locationsVisited.includes(locIdx))G.stats.locationsVisited.push(locIdx);
  // Cutscene for special encounters
  const cutscene=getBattleCutscene(loc,e);
  if(cutscene){
    showCutscene(cutscene,()=>{
      addBattleLog(`A ${e.name} ${e.icon} (Grade ${e.grade<=-2?"Supreme":e.grade<=-1?"Special":e.grade}) appears!${e.domain?" ⚠️ Can expand Domain!":""}`,"alert");
      showScreen("battle");
    });
  }else{
    addBattleLog(`A ${e.name} ${e.icon} (Grade ${e.grade<=-2?"Supreme":e.grade<=-1?"Special":e.grade}) appears!${e.domain?" ⚠️ Can expand Domain!":""}`,"alert");
    showScreen("battle");
  }
}

function useFusion(name){
  if(G.battleTurn!=="player"||G.battleResult)return;
  const fusions=getAvailableFusions();
  const f=fusions.find(x=>x.name===name);if(!f)return;
  if(G.player.ce<f.ceCost)return;
  G.player.ce-=f.ceCost;

  // Mahoraga summoning cutscene
  if(name==="Eight-Handled Sword: Mahoraga"){
    showMahoragaSummon(()=>resolveFusionDamage(f,name));
    return;
  }
  resolveFusionDamage(f,name);
}

function resolveFusionDamage(f,name){
  const eb=getEquipBonus();const sb=getSkinBonus();
  let{dmg,crit}=calcDamage(G.player.atk+eb.atk+sb.atk,G.enemy.def,f.power,G.atkBuff,0.1);
  if(G.dailyMod==="megaCrit"&&crit)dmg=Math.floor(dmg*2.5);
  if(G.dailyMod==="glassCannon")dmg=Math.floor(dmg*2);
  G.atkBuff=1;
  if(crit){G.stats.crits++;if(dmg>G.stats.highestCrit)G.stats.highestCrit=dmg}
  G.stats.totalDmgDealt=(G.stats.totalDmgDealt||0)+dmg;
  if(!G.dailyCounters)G.dailyCounters={};
  G.dailyCounters.techs=(G.dailyCounters.techs||0)+1;
  G.dailyCounters.dmg=(G.dailyCounters.dmg||0)+dmg;
  G.dailyCounters.crits=(G.dailyCounters.crits||0)+(crit?1:0);
  G.enemy.hp=Math.max(0,G.enemy.hp-dmg);
  addBattleLog(`${crit?"⚡ CRITICAL! ":""}🧬 FUSION: ${f.icon} ${name}! ${dmg} damage!`,"crit");
  playSound(crit?"crit":"hit");
  shakeBattle();
  if(G.enemy.hp<=0){handleVictory();return}
  G.battleTurn="enemy";renderBattle();setTimeout(enemyTurn,800);
}

function endBossRush(){
  inBossRush=false;bossRushStage=0;
  if(G.battleResult==="defeat"){G.player.hp=Math.floor(G.player.maxHP*.5);G.player.ce=Math.floor(G.player.maxCE*.5)}
  saveGame();showScreen("hub");
}

    <div style="display:flex;gap:6px;margin-top:8px">
      <button class="btn" style="flex:1;padding:10px 0;font-size:11px;background:#22c55e;color:#000" onclick="saveServerUrl()">💾 SAVE & CONNECT</button>
      ${currentUrl?`<button class="btn" style="padding:10px 14px;font-size:11px;background:#ef444422;color:#ef4444;border:1px solid #ef444444" onclick="clearServerUrl()">✕</button>`:""}
    </div>

    <button class="modal-close" onclick="closeModal()">Close</button>

async function saveServerUrl(){
  const el=document.getElementById("serverUrlInput");
  const status=document.getElementById("serverTestStatus");
  let url=(el?el.value:"").trim();
  if(!url){status.innerHTML=`<span style="color:#ef4444">Enter a URL.</span>`;return}
  // Remove trailing slash
  if(url.endsWith("/"))url=url.slice(0,-1);
  status.innerHTML=`<span style="color:#94a3b8">Testing connection...</span>`;
  try{
    const r=await fetch(url+"/api/stats");
    const d=await r.json();
    if(d&&d.totalPlayers!==undefined){
      localStorage.setItem("cursed_lineage_api_url",url);
      status.innerHTML=`<span style="color:#22c55e">✅ Connected! ${d.totalPlayers} players online. Reloading...</span>`;
      setTimeout(()=>window.location.reload(),1500);
    }else{
      status.innerHTML=`<span style="color:#ef4444">Server responded but doesn't look right. Check the URL.</span>`;
    }
  }catch(e){
    status.innerHTML=`<span style="color:#ef4444">Can't reach server. Check the URL and make sure it's deployed.</span>`;
  }
}

function clearServerUrl(){
  localStorage.removeItem("cursed_lineage_api_url");
  window.location.reload();
}

function exitBattle(){
  if(G.battleResult==="defeat"){G.player.hp=Math.floor(G.player.maxHP*.5);G.player.ce=Math.floor(G.player.maxCE*.5)}
  if(inArenaMode){
    // Save arena stats
    if(arenaStreak>0){
      if(!G.stats.bestArenaStreak)G.stats.bestArenaStreak=0;
      if(!G.stats.totalArenaWins)G.stats.totalArenaWins=0;
      if(arenaStreak>G.stats.bestArenaStreak)G.stats.bestArenaStreak=arenaStreak;
      G.stats.totalArenaWins+=arenaStreak;
      // Daily counters for PvP
      if(!G.dailyCounters)G.dailyCounters={};
      G.dailyCounters.pvp=(G.dailyCounters.pvp||0)+arenaStreak;
      if(arenaStreak>(G.dailyCounters.streak||0))G.dailyCounters.streak=arenaStreak;
      saveGame();
    }
  }
  inArenaMode=false;arenaStreak=0;
  showScreen("hub");
}

function returnToHub(){exitBattle()}

function playerAttack(tName){
  if(G.battleTurn!=="player"||G.battleResult)return;
  const tc=TECHNIQUES[tName];if(!tc)return;
  const tBonus=getTechBonus(tName);
  let ceCost=Math.max(1,tc.ceCost-tBonus.ceDiscount);
  if(G.dailyMod==="ceCost2x")ceCost=ceCost*2;
  if(G.player.ce<ceCost)return;
  G.player.ce-=ceCost;

  // Domain Expansion
  if(tc.type==="domain"&&tc.domainName){
    showDomainExpansion(tc,tName);return;
  }

  if(tc.type==="heal"){
    if(G.dailyMod==="noHeal"){addBattleLog("🚫 Healing is disabled this fight!","alert");G.player.ce+=ceCost;renderBattle();return}
    const heal=Math.min(tc.healAmount,G.player.maxHP-G.player.hp);
    G.player.hp+=heal;
    addBattleLog(`You use ${tName}! Healed ${heal} HP.`,"heal");
    G.battleTurn="enemy";renderBattle();setTimeout(enemyTurn,800);return;
  }
  if(tc.type==="buff"){
    G.player.def+=tc.buffAmount;
    addBattleLog(`You activate ${tName}! DEF +${tc.buffAmount}!`,"buff");
    G.battleTurn="enemy";renderBattle();setTimeout(enemyTurn,800);return;
  }

  // Attack
  const eb=getEquipBonus();
  const sb=getSkinBonus();
  let{dmg,crit}=calcDamage(G.player.atk+eb.atk+sb.atk,G.enemy.def,tc.power+tBonus.powerBonus,G.atkBuff,tBonus.critBonus||0);
  // Daily modifier: mega crits
  if(G.dailyMod==="megaCrit"&&crit)dmg=Math.floor(dmg*2.5);
  // Daily modifier: glass cannon
  if(G.dailyMod==="glassCannon")dmg=Math.floor(dmg*2);
  G.atkBuff=1;
  if(crit){G.stats.crits++;if(dmg>G.stats.highestCrit)G.stats.highestCrit=dmg}
  G.stats.totalDmgDealt=(G.stats.totalDmgDealt||0)+dmg;
  if(!G.stats.techUsage)G.stats.techUsage={};
  G.stats.techUsage[tName]=(G.stats.techUsage[tName]||0)+1;
  // Daily counters
  if(!G.dailyCounters)G.dailyCounters={};
  G.dailyCounters.techs=(G.dailyCounters.techs||0)+1;
  G.dailyCounters.dmg=(G.dailyCounters.dmg||0)+dmg;
  G.dailyCounters.crits=(G.dailyCounters.crits||0)+(crit?1:0);
  G.enemy.hp=Math.max(0,G.enemy.hp-dmg);
  addBattleLog(`${crit?"⚡ CRITICAL! ":""}${tName}! Dealt ${dmg} damage!`,crit?"crit":"attack");
  playSound(crit?"crit":"hit");
  shakeBattle();

  if(G.enemy.hp<=0){handleVictory();return}
  G.battleTurn="enemy";renderBattle();setTimeout(enemyTurn,800);
}

function enemyTurn(){
  if(!G.enemy||G.enemy.hp<=0)return;
  G.battleTurnCount++;
  const e=G.enemy;

  // Enemy Domain check (works for both regular enemies and PvP/NPC with domain)
  if(e.domain&&!G.enemyDomainUsed&&G.battleTurnCount>=2){
    const hpPct=e.hp/e.maxHP;
    let chance;
    if(hpPct<.3) chance=1.0;         // Below 30% — guaranteed, desperate last stand
    else if(hpPct<.4) chance=.9;     // Below 40% — almost certain
    else if(hpPct<.5) chance=.75;    // Below 50% — very aggressive
    else if(hpPct<.7) chance=.35;    // Below 70% — moderate
    else chance=G.battleTurnCount<=3?.15:G.battleTurnCount<=5?.25:.4; // Above 70% — low early, builds over time
    if(G.battleTurnCount>=10)chance=Math.max(chance,.85); // Long fights force it
    if(Math.random()<chance){
      G.enemyDomainUsed=true;
      addBattleLog(`🌀 ${e.name} clasps their hands... DOMAIN EXPANSION!`,"alert");
      renderBattle();
      showEnemyDomain();return;
    }
  }

  // PvP/NPC enemies with techniques — use special abilities
  if(e.techniques&&e.techniques.length>0&&Math.random()<0.6){
    // Pick a non-domain technique to use
    const usable=e.techniques.filter(t=>{const tc=TECHNIQUES[t];return tc&&tc.type!=="domain"});
    if(usable.length>0){
      const pick=usable[Math.floor(Math.random()*usable.length)];
      const tc=TECHNIQUES[pick];

      if(tc.type==="heal"&&e.hp<e.maxHP*.6){
        // Enemy heals
        const heal=Math.min(tc.healAmount||50,e.maxHP-e.hp);
        e.hp+=heal;
        addBattleLog(`💚 ${e.name} uses ${pick}! Healed ${heal} HP!`,"heal");
        const ceRegen=Math.floor(5+Math.random()*5);
        G.player.ce=Math.min(G.player.maxCE,G.player.ce+ceRegen);
        G.battleTurn="player";renderBattle();return;
      }

      if(tc.type==="buff"){
        // Enemy buffs
        e.def=(e.def||0)+(tc.buffAmount||10);
        addBattleLog(`🛡️ ${e.name} activates ${pick}! DEF +${tc.buffAmount}!`,"buff");
        const ceRegen=Math.floor(5+Math.random()*5);
        G.player.ce=Math.min(G.player.maxCE,G.player.ce+ceRegen);
        G.battleTurn="player";renderBattle();return;
      }

      if(tc.power&&tc.power>0){
        // Enemy uses an offensive technique
        const eb=getEquipBonus();const sb3=getSkinBonus();
        const power=tc.power*(0.85+Math.random()*0.3);
        const{dmg,crit}=calcDamage(e.atk,G.player.def+eb.def+sb3.def,power);
        G.player.hp=Math.max(0,G.player.hp-dmg);
        const ceRegen=Math.floor(5+Math.random()*5);
        G.player.ce=Math.min(G.player.maxCE,G.player.ce+ceRegen);

        const typeLabel=tc.type==="physical"?"💥":"✨";
        addBattleLog(`${crit?"⚡ CRITICAL! ":""}${typeLabel} ${e.name} uses ${pick}! ${dmg} damage!`,"enemy");
        shakeBattle();

        if(G.player.hp<=0){G.battleResult="defeat";addBattleLog("You have been exorcised...","alert")}
        else G.battleTurn="player";
        renderBattle();return;
      }
    }
  }

  // Normal attack (fallback)
  const eb=getEquipBonus();const sb2=getSkinBonus();
  let{dmg,crit}=calcDamage(e.atk,G.player.def+eb.def+sb2.def,1.2+Math.random()*.4);
  if(G.dailyMod==="glassCannon")dmg=Math.floor(dmg*2);
  G.player.hp=Math.max(0,G.player.hp-dmg);
  const ceRegen=Math.floor(5+Math.random()*5);
  G.player.ce=Math.min(G.player.maxCE,G.player.ce+ceRegen);
  addBattleLog(`${crit?"💥 CRITICAL! ":""}${e.name} attacks! You take ${dmg} damage!`,"enemy");
  shakeBattle();

  if(G.player.hp<=0){G.battleResult="defeat";addBattleLog("You have been exorcised...","alert")}
  else{G.battleTurn="player";checkAwakening()}
  renderBattle();
}

function handleVictory(){
  const e=G.enemy;
  const xpGain=e.xp+Math.floor(Math.random()*10);
  G.player.xp+=xpGain;levelUp();
  addBattleLog(`🏆 ${e.name} exorcised! +${xpGain} XP`,"victory");
  playSound("victory");

  // Kill health booster
  const gradeBonus=Math.max(0,3-e.grade)*5;
  const killHeal=Math.floor(G.player.maxHP*0.12+8+gradeBonus);
  const killCE=Math.floor(G.player.maxCE*0.10+5+gradeBonus);
  G.player.hp=Math.min(G.player.maxHP,G.player.hp+killHeal);
  G.player.ce=Math.min(G.player.maxCE,G.player.ce+killCE);
  addBattleLog(`💚 Kill boost! +${killHeal} HP, +${killCE} CE`,"heal");

  // Track kill stats
  const gradeKey=String(e.grade);
  if(!G.stats.killsByGrade)G.stats.killsByGrade={};
  G.stats.killsByGrade[gradeKey]=(G.stats.killsByGrade[gradeKey]||0)+1;
  if(G.battleTurnCount<(G.stats.fastestKill||999))G.stats.fastestKill=G.battleTurnCount;

  // Drops
  if(e.drops)e.drops.forEach(drop=>{if(Math.random()<.6){G.inventory[drop]=(G.inventory[drop]||0)+1;addBattleLog(`📦 Obtained: ${drop}`,"drop")}});
  if(e.grade<=1){Object.entries(ITEMS).filter(([,it])=>it.type==="equipment").forEach(([name,it])=>{
    const rate=(it.dropRate||.05)*(e.grade<=-1?2.5:e.grade===0?1.8:1);
    if(Math.random()<rate){G.inventory[name]=(G.inventory[name]||0)+1;addBattleLog(`⭐ RARE DROP: ${it.icon} ${name}!`,"drop")}
  })}
  const goldDrop=Math.floor(10+Math.random()*20*(5-Math.min(e.grade,4)));
  G.gold+=goldDrop;addBattleLog(`💰 +${goldDrop} gold`,"drop");

  G.totalKills++;G.stats.totalGold+=goldDrop;
  // Daily counters
  if(!G.dailyCounters)G.dailyCounters={};
  G.dailyCounters.kills=(G.dailyCounters.kills||0)+1;
  G.dailyCounters.gold=(G.dailyCounters.gold||0)+goldDrop;
  G.dailyCounters.fights=(G.dailyCounters.fights||0)+1;
  const locName=LOCATIONS[G.currentLocation]?.name||"";
  if(locName.includes("Shibuya"))G.stats.shibuyaWins++;
  if(locName.includes("Culling"))G.stats.cullingWins++;
  if(e.name==="Sukuna (20 Fingers)")G.stats.sukuna20++;

  syncQuestProgress();G.battleResult="victory";
  if(G.player.hp<=10&&G.player.hp>0){
    if(!G.unlockedTitles.includes("Unkillable")){G.unlockedTitles.push("Unkillable")}
  }
  // Kill milestone rewards
  const kills=G.totalKills;
  if(kills%5===0){
    const bonusGold=Math.floor(20+kills*2);const bonusXp=Math.floor(15+kills*1.5);
    G.gold+=bonusGold;G.player.xp+=bonusXp;levelUp();
    addBattleLog(`🎯 ${kills} KILL MILESTONE! +${bonusGold} gold, +${bonusXp} XP!`,"victory");
  }
  if(kills%10===0){
    const lootTable=["Cursed Core","Cursed Relic","Domain Fragment","Healing Charm","CE Pill","Reverse Cursed Energy"];
    const drop=lootTable[Math.floor(Math.random()*lootTable.length)];
    G.inventory[drop]=(G.inventory[drop]||0)+1;
    addBattleLog(`🎁 ${kills} KILLS — Bonus drop: ${drop}!`,"drop");
  }
  if(kills%25===0){
    G.player.maxHP+=5;G.player.hp+=5;G.player.atk+=1;G.player.maxCE+=3;G.player.ce+=3;
    addBattleLog(`💪 ${kills} KILLS — Permanent stat boost! HP+5, ATK+1, CE+3!`,"level");
  }
  if(kills===1)addBattleLog("🩸 First blood!","victory");
  if(kills===50)addBattleLog("☠️ 50 kills — you're becoming feared!","victory");
  if(kills===100)addBattleLog("👑 100 kills — LEGENDARY EXORCIST!","victory");

  // Daily challenge bonus rewards
  if(G.dailyMod&&!G.dailyChallengeWon){
    G.dailyChallengeWon=true;
    const bonusGold=200+G.player.level*20;
    const bonusXp=100+G.player.level*15;
    G.gold+=bonusGold;G.player.xp+=bonusXp;levelUp();
    addBattleLog(`🎲 DAILY CHALLENGE COMPLETE! +${bonusGold} gold, +${bonusXp} XP!`,"crit");
    G.dailyMod=null;
  }

  // Reset awakening for next fight
  G.awakened=false;
  checkTitleUnlocks();
  publishToLeaderboard();
  saveGame();renderBattle();
  // Random event after battle (35% chance)
  setTimeout(()=>triggerRandomEvent(),1500);
}

function useBattleItem(name){
  if(G.battleTurn!=="player"||G.battleResult)return;
  const cnt=G.inventory[name]||0;if(cnt<=0)return;
  const item=ITEMS[name];if(!item||item.type!=="consumable")return;
  G.inventory[name]--;if(G.inventory[name]<=0)delete G.inventory[name];

  if(item.effect.hp){const heal=Math.min(item.effect.hp,G.player.maxHP-G.player.hp);G.player.hp+=heal;addBattleLog(`Used ${name}. +${heal} HP`,"heal")}
  if(item.effect.ce){const r=Math.min(item.effect.ce,G.player.maxCE-G.player.ce);G.player.ce+=r;addBattleLog(`Used ${name}. +${r} CE`,"heal")}
  if(item.effect.atkBuff){G.atkBuff=item.effect.atkBuff;addBattleLog(`Used ${name}. ATK ×${item.effect.atkBuff} next attack!`,"buff");renderBattle();return}
  if(item.effect.defBuff){G.player.def+=item.effect.defBuff;addBattleLog(`Used ${name}. DEF +${item.effect.defBuff}!`,"buff")}

  G.battleTurn="enemy";renderBattle();setTimeout(enemyTurn,800);
}

function shakeBattle(){
  const el=document.getElementById("battle");el.classList.add("shaking");
  setTimeout(()=>el.classList.remove("shaking"),300);
}

function checkAwakening(){
  if(G.awakened||!G.player||G.battleResult)return;
  const aw=AWAKENINGS[G.player.classKey];if(!aw)return;
  const hpPct=G.player.hp/G.player.maxHP;
  if(hpPct<=aw.trigger){
    G.awakened=true;
    G.player.atk+=aw.atkBoost;G.player.def+=aw.defBoost;
    G.player.ce=Math.min(G.player.maxCE,G.player.ce+aw.ceBoost);
    const heal=Math.floor(G.player.maxHP*0.15);
    G.player.hp+=heal;
    addBattleLog(`🔥 AWAKENING: ${aw.name}!`,"crit");
    addBattleLog(aw.msg,"buff");
    addBattleLog(`ATK+${aw.atkBoost} DEF+${aw.defBoost} CE+${aw.ceBoost} HP+${heal}!`,"level");
    playSound("awaken");
    renderBattle();
  }
}

function getTechUpgradeCost(level){return[0,80,200,400,800,2000][level]||9999}
function getTechBonus(tName){
  const lv=G.techUpgrades[tName]||0;
  // Each level: +0.4 power, -3 CE cost, +5% crit chance
  return{powerBonus:lv*0.4,ceDiscount:lv*3,critBonus:lv*0.05};
}

function openTechUpgrade(){
  const ov=document.getElementById("overlays");const p=G.player;if(!p)return;
  const pc=p.color;
  let h=`<div class="modal-bg" onclick="closeModal()"><div class="modal" onclick="event.stopPropagation()" style="border-color:${pc}44;max-width:380px">
    <h3 style="color:${pc}">🗡️ Upgrade Techniques</h3>
    <p style="font-size:9px;color:#64748b;margin-bottom:8px">Spend gold to power up your moves. Max level 5.</p>
    <div style="font-size:10px;color:#fbbf24;margin-bottom:10px;font-family:monospace">💰 ${G.gold} gold</div>`;
  p.techniques.forEach(tName=>{
    const tc=TECHNIQUES[tName];if(!tc)return;
    const lv=G.techUpgrades[tName]||0;
    const maxed=lv>=5;
    const cost=getTechUpgradeCost(lv);
    const canBuy=!maxed&&G.gold>=cost;
    const bonus=getTechBonus(tName);
    const stars="★".repeat(lv)+"☆".repeat(5-lv);
    h+=`<div style="display:flex;align-items:center;gap:8px;padding:8px;margin-bottom:4px;background:${pc}08;border:1px solid ${pc}15;border-radius:6px">
      <div style="flex:1">
        <div style="font-size:11px;font-weight:700;color:${pc};font-family:'Russo One',sans-serif">${tName}</div>
        <div style="font-size:8px;color:#fbbf24;letter-spacing:1px">${stars}</div>
        <div style="font-size:8px;color:#64748b">Power +${(bonus.powerBonus).toFixed(1)} • CE -${bonus.ceDiscount} • Crit +${Math.floor(bonus.critBonus*100)}%</div>
      </div>
      <button style="padding:6px 12px;font-size:9px;font-weight:700;border-radius:6px;border:1px solid ${canBuy?pc+"44":"#222"};background:${canBuy?pc+"22":"#111"};color:${canBuy?pc:"#444"};cursor:${canBuy?"pointer":"not-allowed"};font-family:'Russo One',sans-serif" ${canBuy?`onclick="upgradeTech('${tName.replace(/'/g,"\\'")}')"`:maxed?"disabled":"disabled"}>${maxed?"MAXED":cost+"G"}</button>
    </div>`;
  });
  h+=`<button class="modal-close" onclick="closeModal()">Close</button></div></div>`;
  ov.innerHTML=h;
}

function upgradeTech(tName){
  const lv=G.techUpgrades[tName]||0;if(lv>=5)return;
  const cost=getTechUpgradeCost(lv);if(G.gold<cost)return;
  G.gold-=cost;G.techUpgrades[tName]=(lv+1);
  saveGame();openTechUpgrade();
}

function generateFriendCode(){
  if(!G.player||!pvpArenaName)return null;
  const d={n:pvpArenaName,c:G.player.classKey,l:G.player.level,i:G.player.icon,
    a:G.player.atk,d:G.player.def,h:G.player.maxHP,ce:G.player.maxCE,

function copyFriendCode(){
  const code=generateFriendCode();
  if(!code){
    document.getElementById("friendCodeStatus").innerHTML=`<span style="color:#ef4444">Set an arena name first!</span>`;
    return;
  }
  try{
    if(navigator.clipboard&&navigator.clipboard.writeText){
      navigator.clipboard.writeText(code).then(()=>{
        document.getElementById("friendCodeStatus").innerHTML=`<span style="color:#22c55e">✅ Code copied! Share it with friends.</span>`;
      }).catch(()=>fallbackFriendCopy(code));
    }else{fallbackFriendCopy(code)}
  }catch(e){fallbackFriendCopy(code)}
}

function fallbackFriendCopy(code){
  const el=document.createElement("textarea");el.value=code;document.body.appendChild(el);
  el.select();el.setSelectionRange(0,99999);
  try{document.execCommand("copy");document.getElementById("friendCodeStatus").innerHTML=`<span style="color:#22c55e">✅ Copied!</span>`}
  catch(e){document.getElementById("friendCodeStatus").innerHTML=`<span style="color:#f97316">Copy this manually: ${code.substring(0,20)}...</span>`}
  document.body.removeChild(el);
}

function addFriendCode(){
  const el=document.getElementById("friendCodeInput");
  const status=document.getElementById("friendCodeStatus");
  if(!el||!el.value.trim()){status.innerHTML=`<span style="color:#ef4444">Paste a friend code first.</span>`;return}
  const raw=el.value.trim();
  if(!raw.startsWith("FR:")){status.innerHTML=`<span style="color:#ef4444">Invalid code. Must start with FR:</span>`;return}
  try{
    const json=decodeURIComponent(escape(atob(raw.substring(3))));
    const d=JSON.parse(json);
    if(!d.c||!d.n||!d.l){status.innerHTML=`<span style="color:#ef4444">Invalid friend code data.</span>`;return}
    // Build rival from friend data
    const rival={arenaName:d.n,classKey:d.c,level:d.l,icon:d.i||"👤",
      atk:d.a||10,def:d.d||5,maxHP:d.h||100,maxCE:d.ce||50,
      techniques:d.t||[],streak:d.s||0,title:d.ti||"",skin:d.sk||null,
      charName:d.cn||"Unknown",color:d.co||"#e2e8f0"};
    // Check for duplicates
    if(!G.friendRivals)G.friendRivals=[];
    if(G.friendRivals.find(f=>f.arenaName===rival.arenaName)){
      status.innerHTML=`<span style="color:#f97316">${rival.arenaName} is already in your rivals list.</span>`;return;
    }
    G.friendRivals.push(rival);
    saveGame();
    el.value="";
    status.innerHTML=`<span style="color:#22c55e">✅ Added ${rival.arenaName} (${rival.charName} Lv.${rival.level}) as a rival!</span>`;
    renderPvP();
  }catch(e){status.innerHTML=`<span style="color:#ef4444">Could not read code. Check you copied the full text.</span>`}
}

function removeFriend(idx){
  if(!G.friendRivals)return;
  G.friendRivals.splice(idx,1);
  saveGame();renderPvP();
}

async function addServerFriend(){
  const el=document.getElementById("serverFriendInput");
  const status=document.getElementById("serverFriendStatus");
  if(!el||!el.value.trim()){status.innerHTML=`<span style="color:#ef4444">Enter a friend code.</span>`;return}
  const code=el.value.trim().toUpperCase();
  if(code.length<8){status.innerHTML=`<span style="color:#ef4444">Code must be 8 characters (XXXX-XXXX).</span>`;return}
  status.innerHTML=`<span style="color:#94a3b8">Looking up ${code}...</span>`;
  const result=await serverAddFriend(code);
  if(result.ok){
    // Also add to local friendRivals so they appear in matchmaking
    if(result.friend){
      if(!G.friendRivals)G.friendRivals=[];
      if(!G.friendRivals.find(f=>f.arenaName===result.friend.arenaName)){
        G.friendRivals.push({
          arenaName:result.friend.arenaName,classKey:result.friend.classKey,
          charName:result.friend.charName,level:result.friend.level,
          icon:result.friend.icon,color:result.friend.color,
          atk:result.friend.atk,def:result.friend.def,
          maxHP:100,maxCE:50,techniques:[],streak:0
        });
        saveGame();
      }
    }
    el.value="";
    status.innerHTML=`<span style="color:#22c55e">✅ ${result.msg}</span>`;
    setTimeout(()=>renderPvP(),1500);
  }else{
    status.innerHTML=`<span style="color:#ef4444">❌ ${result.msg}</span>`;
  }
}

const DAILY_MODIFIERS=[
  {name:"Double CE Cost",desc:"All techniques cost 2× CE",icon:"⚡",apply:(e)=>e,modBattle:"ceCost2x"},
  {name:"Glass Cannon",desc:"You deal 2× damage but take 2× damage",icon:"💥",apply:(e)=>e,modBattle:"glassCannon"},
  {name:"No Healing",desc:"Healing is disabled this fight",icon:"🚫",apply:(e)=>e,modBattle:"noHeal"},
  {name:"One-Hit Crits",desc:"Critical hits do 5× damage",icon:"☠️",apply:(e)=>e,modBattle:"megaCrit"},
  {name:"CE Drought",desc:"Start with only 30% CE",icon:"🏜️",apply:(e)=>e,modBattle:"ceDrought"},
  {name:"Iron Skin",desc:"Enemy has +50% DEF",icon:"🛡️",apply:(e)=>{e.def=Math.floor(e.def*1.5);return e},modBattle:"none"},
  {name:"Berserker",desc:"ATK +50% but DEF -50%",icon:"🔥",apply:(e)=>e,modBattle:"berserker"},
];

function getDailyChallenge(){
  const today=new Date().toISOString().slice(0,10);
  const seed=today.split("-").reduce((a,b)=>a+parseInt(b),0);
  const mod=DAILY_MODIFIERS[seed%DAILY_MODIFIERS.length];
  // Pick boss appropriate to player grade
  const lv=G.player?G.player.level:1;
  let bosses;
  if(lv<4) bosses=["Fly Head Curse","Cursed Doll","Finger Bearer (Weak)"];
  else if(lv<7) bosses=["Cursed Corpse","Grasshopper Curse","Reggie Star"];
  else if(lv<11) bosses=["Naoya Zenin (Curse)","Finger Bearer","Smallpox Deity","Dagon"];
  else if(lv<15) bosses=["Hanami","Jogo","Kashimo (Echo)","Yorozu (Vessel)"];
  else if(lv<20) bosses=["Mahito","Kenjaku","Hanami"];
  else bosses=["Sukuna (Fragment)","Kenjaku","Sukuna (20 Fingers)"];
  return{mod,bossName:bosses[seed%bosses.length],date:today};
}

function startDailyChallenge(){
  const dc=getDailyChallenge();
  const today=dc.date;
  if(G.dailyChallengeDate===today&&G.dailyChallengeWon){return}
  G.dailyChallengeDate=today;G.dailyMod=dc.mod.modBattle;
  // Find the boss enemy
  const boss=ENEMIES.find(e=>e.name===dc.bossName)||ENEMIES[ENEMIES.length-1];
  const scale=1+(G.player.level-1)*.1;
  const e={...boss,hp:Math.floor(boss.hp*scale*1.3),maxHP:Math.floor(boss.hp*scale*1.3),atk:Math.floor(boss.atk*scale*1.2),def:Math.floor(boss.def*scale)};
  dc.mod.apply(e);
  G.currentLocation=0;G.enemy=e;G.battleLog=[];G.battleResult=null;G.battleTurn="player";G.atkBuff=1;
  G.battleTurnCount=0;G.enemyDomainUsed=false;G.bindingVow=null;G.encounterCount++;G.awakened=false;
  // Apply player modifiers
  if(dc.mod.modBattle==="ceDrought")G.player.ce=Math.floor(G.player.maxCE*0.3);
  if(dc.mod.modBattle==="berserker"){G.player.atk=Math.floor(G.player.atk*1.5);G.player.def=Math.floor(G.player.def*0.5)}
  inArenaMode=false;arenaStreak=0;
  addBattleLog(`🎲 DAILY CHALLENGE: ${dc.mod.name}!`,"crit");
  addBattleLog(`${dc.mod.icon} ${dc.mod.desc}`,"alert");
  addBattleLog(`Boss: ${e.name} ${e.icon} — Extra rewards on victory!`,"alert");
  showScreen("battle");
}

function triggerRandomEvent(){
  if(Math.random()>.35)return; // 35% chance after each victory
  const totalWeight=RANDOM_EVENTS.reduce((s,e)=>s+e.weight,0);
  let roll=Math.random()*totalWeight;
  let event=RANDOM_EVENTS[0];
  for(const e of RANDOM_EVENTS){roll-=e.weight;if(roll<=0){event=e;break}}
  
  const ov=document.getElementById("overlays");
  ov.innerHTML=`<div class="modal-bg"><div class="modal" style="border-color:#fbbf2444;max-width:320px;text-align:center">
    <div style="font-size:48px;margin-bottom:8px;filter:drop-shadow(0 0 12px #fbbf2444)">${event.icon}</div>
    <h3 style="color:#fbbf24;margin-bottom:6px">${event.name}</h3>
    <p style="font-size:11px;color:#94a3b8;margin-bottom:14px;line-height:1.5">${event.msg}</p>
    <button class="btn" style="background:linear-gradient(135deg,#fbbf24,#d97706);color:#000;font-size:13px" onclick="resolveRandomEvent('${event.id}')">Investigate</button>
    <button class="modal-close" style="margin-top:8px" onclick="closeModal()">Walk Away</button>
  </div></div>`;
}

function resolveRandomEvent(id){
  const event=RANDOM_EVENTS.find(e=>e.id===id);if(!event)return closeModal();
  const result=event.execute();
  saveGame();
  const ov=document.getElementById("overlays");
  ov.innerHTML=`<div class="modal-bg"><div class="modal" style="border-color:#fbbf2444;max-width:320px;text-align:center">
    <div style="font-size:48px;margin-bottom:8px">${event.icon}</div>

    <button class="btn" style="background:#1e293b;color:#e2e8f0;font-size:12px" onclick="closeModal()">Continue</button>
  </div></div>`;
}

function getAvailableFusions(){
  if(!G.player)return[];
  const techs=G.player.techniques;
  const found=[];
  for(let i=0;i<techs.length;i++){
    for(let j=i+1;j<techs.length;j++){
      const key=techs[i]+"+"+techs[j];
      const keyR=techs[j]+"+"+techs[i];
      const f=FUSIONS[key]||FUSIONS[keyR];
      if(f&&!found.find(x=>x.name===f.name)){
        found.push({...f,from:[techs[i],techs[j]],key:key});
      }
    }
  }
  return found;
}

function openFusions(){
  const ov=document.getElementById("overlays");const pc=G.player?G.player.color:"#a78bfa";
  const fusions=getAvailableFusions();
  let h=`<div class="modal-bg" onclick="closeModal()"><div class="modal" onclick="event.stopPropagation()" style="border-color:#a78bfa44;max-width:380px">
    <h3 style="color:#a78bfa">🧬 Fusion Techniques</h3>
    <p style="font-size:9px;color:#64748b;margin-bottom:10px">Combine two techniques into a devastating hybrid move. Available fusions depend on your character's kit.</p>`;
  if(fusions.length===0){
    h+=`<div style="text-align:center;padding:20px;color:#475569;font-size:11px">No fusions available for your current character's techniques.</div>`;
  }else{
    fusions.forEach(f=>{
      const unlocked=(G.unlockedFusions||[]).includes(f.name);
      const cost=unlocked?0:500+G.player.level*50;
      const canBuy=!unlocked&&G.gold>=cost;
      h+=`<div style="padding:10px;margin-bottom:6px;background:${unlocked?"#a78bfa10":"#0f172a"};border:1px solid ${unlocked?"#a78bfa33":"#1e293b"};border-radius:8px">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
          <span style="font-size:22px">${f.icon}</span>
          <div style="flex:1">
            <div style="font-size:12px;font-weight:700;color:#a78bfa;font-family:'Russo One',sans-serif">${f.name}</div>
            <div style="font-size:8px;color:#64748b">${f.from[0]} + ${f.from[1]}</div>
          </div>
          ${unlocked?`<span style="font-size:9px;color:#22c55e;font-weight:700">UNLOCKED ✓</span>`
          :`<button style="padding:5px 12px;font-size:9px;font-weight:700;border-radius:6px;border:1px solid ${canBuy?"#a78bfa44":"#222"};background:${canBuy?"#a78bfa22":"#111"};color:${canBuy?"#a78bfa":"#444"};cursor:${canBuy?"pointer":"not-allowed"};font-family:'Russo One',sans-serif" ${canBuy?`onclick="unlockFusion('${f.name}',${cost})"`:"disabled"}>${cost}G</button>`}

      </div>`;
    });
  }
  h+=`<button class="modal-close" onclick="closeModal()">Close</button></div></div>`;
  ov.innerHTML=h;
}

function unlockFusion(name,cost){
  if(G.gold<cost)return;
  G.gold-=cost;
  if(!G.unlockedFusions)G.unlockedFusions=[];
  if(!G.unlockedFusions.includes(name))G.unlockedFusions.push(name);
  saveGame();openFusions();
}

function buySkin(name){

  if(!G.ownedSkins.includes(name))G.ownedSkins.push(name);
  G.equippedSkin=name;
  saveGame();openSkins();
}

// BATTLE SOUNDS — Tone.js audio effects
// ═══════════════════════════════════════════════════════════════

let soundEnabled=false;
let synth=null,noiseSynth=null;

function initSound(){
  if(typeof Tone==="undefined")return;
  try{
    synth=new Tone.Synth({oscillator:{type:"triangle"},envelope:{attack:.01,decay:.1,sustain:.05,release:.3},volume:-12}).toDestination();
    noiseSynth=new Tone.NoiseSynth({noise:{type:"brown"},envelope:{attack:.005,decay:.08,sustain:0,release:.1},volume:-18}).toDestination();
  }catch(e){console.log("Sound init failed:",e)}
}

function playSound(type){
  if(!soundEnabled||!synth)return;
  try{
    switch(type){
      case"hit":synth.triggerAttackRelease("C3","16n");break;
      case"crit":synth.triggerAttackRelease("E5","8n");setTimeout(()=>synth.triggerAttackRelease("G5","16n"),80);break;
      case"heal":synth.triggerAttackRelease("C5","8n");setTimeout(()=>synth.triggerAttackRelease("E5","8n"),120);setTimeout(()=>synth.triggerAttackRelease("G5","4n"),240);break;
      case"domain":synth.triggerAttackRelease("C2","2n");setTimeout(()=>noiseSynth?.triggerAttackRelease("4n"),200);break;
      case"victory":["C5","E5","G5","C6"].forEach((n,i)=>setTimeout(()=>synth.triggerAttackRelease(n,"8n"),i*120));break;
      case"defeat":["C4","A3","F3","C3"].forEach((n,i)=>setTimeout(()=>synth.triggerAttackRelease(n,"4n"),i*200));break;
      case"click":synth.triggerAttackRelease("A5","32n");break;
      case"buff":synth.triggerAttackRelease("D5","16n");setTimeout(()=>synth.triggerAttackRelease("F#5","16n"),60);break;
      case"awaken":["C4","E4","G4","C5","E5","G5"].forEach((n,i)=>setTimeout(()=>synth.triggerAttackRelease(n,"8n"),i*100));break;
    }
  }catch(e){}
}

function toggleSound(){
  soundEnabled=!soundEnabled;
  if(soundEnabled&&!synth)initSound();
  if(soundEnabled)Tone?.start();
  renderHub();
}

function showCutscene(cutscene,callback){
  const ov=document.getElementById("overlays");
  let lineIdx=0;
  function renderLine(){
    if(lineIdx>=cutscene.lines.length){
      ov.innerHTML="";callback();return;
    }
    const line=cutscene.lines[lineIdx];
    const isLast=lineIdx>=cutscene.lines.length-1;
    ov.innerHTML=`<div style="position:fixed;inset:0;z-index:200;background:${cutscene.bg||"#0a0a0f"}ee;display:flex;flex-direction:column;justify-content:flex-end;padding:20px;cursor:pointer" onclick="nextCutsceneLine()">
      <div style="position:absolute;inset:0;background:radial-gradient(circle at 50% 30%,${cutscene.color}08,transparent 60%);pointer-events:none"></div>
      <div style="text-align:center;margin-bottom:20px;animation:fadeIn .3s ease">
